<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>별 헤는 밤</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Noto Sans KR (고딕-설정창용), Noto Serif KR (명조-원문 및 따라쓰기 가이드 글씨용) -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=300;400;500;700&family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* 어떤 환경에서도 동일한 표준 명조체를 보장하는 CSS 선언 */
    .font-serif-fixed {
      font-family: 'Noto Serif KR', 'Batang', 'AppleMyungjo', 'serif' !important;
      font-weight: 500 !important;
      font-style: normal !important;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #f1f5f9;
    }

    /* 십자 가이드선 스타일 (연한 투명도 0.35 적용) */
    .grid-cell-guide {
      position: relative;
      box-sizing: border-box;
    }
    .grid-cell-guide::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      border-left: 1px dashed rgba(209, 213, 219, 0.35);
      transform: translateX(-50%);
      pointer-events: none;
    }
    .grid-cell-guide::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      border-top: 1px dashed rgba(209, 213, 219, 0.35);
      transform: translateY(-50%);
      pointer-events: none;
    }

    /* 인라인 편집 모드 시 시각적 반응형 힌트 및 포커스 스타일링 */
    [contenteditable="true"] {
      transition: all 0.2s ease;
      border-radius: 4px;
      padding: 1px 4px;
    }
    [contenteditable="true"]:hover {
      background-color: rgba(245, 158, 11, 0.08); 
      outline: 1.5px dashed rgba(245, 158, 11, 0.5);
      cursor: text;
    }
    [contenteditable="true"]:focus {
      background-color: rgba(245, 158, 11, 0.12);
      outline: 2px solid #d97706;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
    }
    [contenteditable="true"]:empty::before {
      content: "입력";
      color: #cbd5e1;
      font-style: italic;
    }

    /* 사파리 크로스브라우징 인쇄 붕괴 방지용 절대 위치 기반 레이아웃 */
    @media print {
      .no-print {
        display: none !important;
      }
      
      html, body {
        background-color: #ffffff !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        height: auto !important;
        overflow: visible !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      @page {
        size: A4 portrait;
        margin: 0 !important;
      }

      div.flex-1, main, #print-area-wrapper, #pages-container {
        display: block !important;
        margin: 0 !important;
        padding: 0 !important;
        border: none !important;
        width: 100% !important;
        height: auto !important;
        min-height: 0 !important;
        box-shadow: none !important;
        background: transparent !important;
      }

      /* 사파리 flex 높이 연산 버그를 피하기 위해 block + position relative 적용 */
      .print-page {
        box-shadow: none !important;
        margin: 0 !important;
        border: none !important;
        break-after: page !important;
        page-break-after: always !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        width: 210mm !important;
        height: 296mm !important; 
        max-height: 296mm !important;
        max-width: 210mm !important;
        padding: 15mm 20mm 15mm 20mm !important;
        box-sizing: border-box !important;
        display: block !important; 
        position: relative !important;
        overflow: hidden !important;
        background-color: white !important;
      }

      .print-page:last-child {
        break-after: auto !important;
        page-break-after: auto !important;
      }

      /* 인쇄 시 "입력" 가이드 텍스트 제거 */
      [contenteditable="true"]:empty::before {
        content: "" !important;
      }
    }

    /* 화면 프리뷰용 (인쇄와 동일하게 block & absolute footer 기법 적용) */
    .a4-page {
      width: 210mm;
      height: 297mm;
      background: white;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08), 0 5px 15px rgba(0, 0, 0, 0.04);
      padding: 15mm 20mm 15mm 20mm; 
      box-sizing: border-box;
      display: block;
      position: relative;
      margin-bottom: 2.5rem;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f8fafc;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <header class="bg-slate-900 text-white shadow-md no-print py-4 px-6 flex justify-between items-center z-10 shrink-0">
    <div class="flex items-center space-x-3">
      <div class="bg-emerald-600 p-2 rounded-lg">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight">필사 용지 만들기</h1>
      </div>
    </div>
  </header>

  <div class="flex-1 flex flex-col lg:flex-row min-h-0">
    
    <!-- 좌측 제어 사이드바 -->
    <aside class="w-full lg:w-[420px] bg-white border-r border-slate-200 p-6 overflow-y-auto no-print shrink-0 lg:sticky lg:top-0 lg:h-[calc(100vh-72px)] flex flex-col justify-between space-y-6">
      
      <div class="space-y-6">
        <!-- 인쇄 버튼 최상단 배치 -->
        <div class="pb-2 border-b border-slate-150">
          <button onclick="window.print()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-md flex items-center justify-center space-x-2.5 transition-all active:scale-95">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path>
            </svg>
            <span class="text-base tracking-wide">인쇄 / PDF 저장</span>
          </button>
        </div>

        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">1. 글 제목</label>
          <input type="text" id="input-title" value="별 헤는 밤" class="w-full p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium" placeholder="필사할 글의 제목을 적어주세요.">
        </div>

        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm flex justify-between items-center">
            <span>2. 필사할 원문 붙여넣기</span>
            <span id="char-counter" class="text-xs font-normal text-slate-500">0자 입력됨</span>
          </label>
          <textarea id="source-text" class="w-full h-36 p-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm leading-relaxed" placeholder="여기에 필사할 원문을 붙여 넣으세요."></textarea>
        </div>

        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">3. 가로 칸 수 설정</label>
          <select id="grid-cols-select" class="w-full p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm bg-white">
            <option value="10">10칸 (초등 저학년 / 큰 글자)</option>
            <option value="12">12칸</option>
            <option value="14">14칸</option>
            <option value="16">16칸</option>
            <option value="18">18칸</option>
            <option value="20" selected>20칸 (표준 200자형 / 500자)</option>
            <option value="22">22칸</option>
            <option value="24">24칸 (집중도 높은 필사용)</option>
            <option value="line">줄 노트 (가로줄만 표시)</option>
          </select>
        </div>

        <div class="space-y-3">
          <div class="grid grid-cols-2 gap-3 text-xs text-slate-600">
            <div>
              <span class="block mb-1 font-medium text-slate-500">학교 이름</span>
              <input type="text" id="input-school" value="건국초등학교" class="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" placeholder="학교 이름 입력">
            </div>
            <div>
              <span class="block mb-1 font-medium text-slate-500">학년 / 반</span>
              <input type="text" id="input-grade" value="" class="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" placeholder="학년 / 반 입력">
            </div>
            <div class="col-span-2">
              <span class="block mb-1 font-medium text-slate-500">날짜</span>
              <input type="text" id="input-date" value="" class="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" placeholder="날짜 입력">
            </div>
            <div class="col-span-2">
              <span class="block mb-1 font-semibold text-emerald-800">학생 이름</span>
              <input type="text" id="input-name" value="" class="w-full p-2.5 border-2 border-emerald-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600 text-sm font-bold bg-emerald-50/35" placeholder="학생 이름 입력">
            </div>
          </div>
        </div>

        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">4. 출력 방식</label>
          <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 space-y-2.5">
            <label class="flex items-center cursor-pointer">
              <input type="checkbox" id="pattern-guide" checked class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
              <span class="ml-2.5 text-xs text-slate-700 font-bold">따라쓰기 글씨 포함</span>
            </label>
            <label class="flex items-center cursor-pointer">
              <input type="checkbox" id="pattern-empty" checked class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
              <span class="ml-2.5 text-xs text-slate-700 font-bold">빈 원고지</span>
            </label>
          </div>
          <div class="mt-4 pt-3 border-t border-slate-200 space-y-2.5">
            <label class="flex items-center cursor-pointer">
              <input type="checkbox" id="exclude-first-page" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
              <span class="ml-2.5 text-xs text-slate-700 font-bold">첫 페이지(원문 보기) 제외</span>
            </label>
            <label class="flex items-center cursor-pointer">
              <input type="checkbox" id="hide-manuscript-header" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
              <span class="ml-2.5 text-xs text-slate-700 font-bold">원고지 페이지에 제목 등 표시 안 함</span>
            </label>
          </div>
        </div>

        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">5. 원고지 색</label>
          <div class="grid grid-cols-4 gap-3">
            <button onclick="changeGridColor('border-slate-950', 'text-slate-950')" class="flex items-center justify-center p-1.5 rounded-lg border hover:bg-slate-50 active:scale-95 transition-all" title="칠흑 검정">
              <span class="w-4 h-4 rounded-full bg-slate-950"></span>
            </button>
            <button onclick="changeGridColor('border-emerald-600', 'text-emerald-600')" class="flex items-center justify-center p-1.5 rounded-lg border hover:bg-slate-50 active:scale-95 transition-all" title="전통 청록">
              <span class="w-4 h-4 rounded-full bg-emerald-600"></span>
            </button>
            <button onclick="changeGridColor('border-red-500', 'text-red-500')" class="flex items-center justify-center p-1.5 rounded-lg border hover:bg-slate-50 active:scale-95 transition-all" title="벽돌 적색">
              <span class="w-4 h-4 rounded-full bg-red-500"></span>
            </button>
            <button onclick="changeGridColor('border-blue-600', 'text-blue-600')" class="flex items-center justify-center p-1.5 rounded-lg border hover:bg-slate-50 active:scale-95 transition-all" title="남청색">
              <span class="w-4 h-4 rounded-full bg-blue-600"></span>
            </button>
            <button onclick="changeGridColor('border-slate-700', 'text-slate-700')" class="flex items-center justify-center p-1.5 rounded-lg border hover:bg-slate-50 active:scale-95 transition-all" title="정갈한 먹색">
              <span class="w-4 h-4 rounded-full bg-slate-700"></span>
            </button>
            <button onclick="changeGridColor('border-amber-800', 'text-amber-800')" class="flex items-center justify-center p-1.5 rounded-lg border hover:bg-slate-50 active:scale-95 transition-all" title="앤티크 갈색">
              <span class="w-4 h-4 rounded-full bg-amber-800"></span>
            </button>
            <button onclick="changeGridColor('border-purple-700', 'text-purple-700')" class="flex items-center justify-center p-1.5 rounded-lg border hover:bg-slate-50 active:scale-95 transition-all" title="로열 보라">
              <span class="w-4 h-4 rounded-full bg-purple-700"></span>
            </button>
            <button onclick="changeGridColor('border-indigo-600', 'text-indigo-600')" class="flex items-center justify-center p-1.5 rounded-lg border hover:bg-slate-50 active:scale-95 transition-all" title="인디고">
              <span class="w-4 h-4 rounded-full bg-indigo-600"></span>
            </button>
            <button onclick="changeGridColor('border-orange-700', 'text-orange-700')" class="flex items-center justify-center p-1.5 rounded-lg border hover:bg-slate-50 active:scale-95 transition-all" title="테라코타 주황">
              <span class="w-4 h-4 rounded-full bg-orange-700"></span>
            </button>
          </div>
        </div>
      </div>
    </aside>

    <main class="flex-1 bg-slate-100 overflow-y-auto p-4 md:p-8 flex flex-col items-center">
      <div id="print-area-wrapper" class="w-full flex flex-col items-center">
        <!-- 동적으로 페이지들이 얹어질 프리뷰 컨테이너 -->
        <div id="pages-container" class="flex flex-col items-center"></div>
      </div>
    </main>

  </div>

  <script>
    let sourceText = "계절이 지나가는 하늘에는\n가을로 가득 차 있습니다.\n\n나는 아무 걱정도 없이\n가을 속의 별들을 다 헤일 듯합니다.\n\n가슴속에 하나 둘 새겨지는 별을\n이제 다 못 헤는 것은\n쉬이 아침이 오는 까닭이요,\n내일 밤이 남은 까닭이요,\n아직 나의 청춘이 다하지 않은 까닭입니다.\n\n별 하나에 추억과\n별 하나에 사랑과\n별 하나에 쓸쓸함과\n별 하나에 동경과\n별 하나에 시와\n별 하나에 어머니, 어머니";
    let articleTitle = "별 헤는 밤";
    let gridCols = "20"; 
    let schoolName = "건국초등학교";
    let gradeInfo = "";
    let studentName = "";
    let currentDate = "";
    let excludeFirstPage = false; 
    let hideManuscriptHeader = false; 
    let gridBorderColorClass = "border-emerald-600";
    let gridTextColorClass = "text-emerald-600";

    let headerLeftText = "고운 글 필사";
    let footerSourceText = "원문 읽기";
    let footerGuideText = "따라 쓰기";
    let footerEmptyText = "원고지";

    document.getElementById('source-text').value = sourceText;
    document.getElementById('char-counter').textContent = `${sourceText.length}자 입력됨`;
    document.title = articleTitle ? articleTitle : "필사 용지 만들기";

    document.getElementById('source-text').addEventListener('input', (e) => {
      sourceText = e.target.value;
      document.getElementById('char-counter').textContent = `${sourceText.length}자 입력됨`;
      renderPages();
    });

    document.getElementById('input-title').addEventListener('input', (e) => {
      articleTitle = e.target.value;
      document.title = articleTitle ? articleTitle : "필사 용지 만들기";
      renderPages();
    });

    document.getElementById('grid-cols-select').addEventListener('change', (e) => {
      gridCols = e.target.value;
      renderPages();
    });

    const inputs = ['input-school', 'input-grade', 'input-name', 'input-date'];
    inputs.forEach(id => {
      document.getElementById(id).addEventListener('input', (e) => {
        if (id === 'input-school') schoolName = e.target.value;
        if (id === 'input-grade') gradeInfo = e.target.value;
        if (id === 'input-name') studentName = e.target.value;
        if (id === 'input-date') currentDate = e.target.value;
        updateHeaderAndTitle();
      });
    });

    document.getElementById('pattern-guide').addEventListener('change', renderPages);
    document.getElementById('pattern-empty').addEventListener('change', renderPages);
    document.getElementById('exclude-first-page').addEventListener('change', (e) => {
      excludeFirstPage = e.target.checked;
      renderPages();
    });
    document.getElementById('hide-manuscript-header').addEventListener('change', (e) => {
      hideManuscriptHeader = e.target.checked;
      renderPages();
    });

    function changeGridColor(borderClass, textClass) {
      gridBorderColorClass = borderClass;
      gridTextColorClass = textClass;
      renderPages();
    }

    // 3분할 그리드(Grid)에 예쁘게 들어갈 수 있는 크기로 컴팩트하게 조정된 기본 수기용 텍스트
    function getBlankPlaceholders() {
      return {
        school: schoolName.trim() ? schoolName : "",
        grade: gradeInfo.trim() ? gradeInfo : "__________학년 __________반",
        date: currentDate.trim() ? currentDate : "___________년 _________월 _________일",
        name: "" 
      };
    }

    function updateHeaderAndTitle() {
      const placeholders = getBlankPlaceholders();
      
      document.querySelectorAll('.school-placeholder').forEach(el => el.textContent = placeholders.school);
      document.querySelectorAll('.grade-placeholder').forEach(el => el.textContent = placeholders.grade);
      document.querySelectorAll('.date-placeholder').forEach(el => el.textContent = placeholders.date);
      
      document.querySelectorAll('.name-placeholder-container').forEach(el => {
        if (studentName.trim()) {
          el.innerHTML = `<span class="name-placeholder text-slate-900 text-base font-extrabold flex-1 text-center tracking-[1em] pl-[1em]" contenteditable="true">${studentName}</span>`;
        } else {
          el.innerHTML = `<span class="name-placeholder text-slate-400 text-base font-medium flex-1 text-center tracking-normal" contenteditable="true"></span>`;
        }
      });
      
      document.querySelectorAll('.title-placeholder').forEach(el => {
        el.textContent = articleTitle ? articleTitle : '';
      });
    }

    function syncMetadata(className, value, activeElement) {
      document.querySelectorAll('.' + className).forEach(el => {
        if (el !== activeElement) {
          el.textContent = value;
        }
      });
    }

    document.addEventListener('input', (e) => {
      const target = e.target;
      if (!target.hasAttribute('contenteditable')) return;

      if (target.innerHTML === '<br>') {
        target.innerHTML = '';
      }

      if (target.classList.contains('school-placeholder')) {
        schoolName = target.textContent;
        document.getElementById('input-school').value = schoolName;
        syncMetadata('school-placeholder', schoolName, target);
      }
      else if (target.classList.contains('grade-placeholder')) {
        gradeInfo = target.textContent;
        document.getElementById('input-grade').value = gradeInfo;
        syncMetadata('grade-placeholder', gradeInfo, target);
      }
      else if (target.classList.contains('date-placeholder')) {
        currentDate = target.textContent;
        document.getElementById('input-date').value = currentDate;
        syncMetadata('date-placeholder', currentDate, target);
      }
      else if (target.classList.contains('name-placeholder')) {
        studentName = target.textContent;
        document.getElementById('input-name').value = studentName;
        syncMetadata('name-placeholder', studentName, target);
      }
      else if (target.classList.contains('title-placeholder')) {
        articleTitle = target.textContent;
        document.getElementById('input-title').value = articleTitle;
        syncMetadata('title-placeholder', articleTitle, target);
        document.title = articleTitle ? articleTitle : "필사 용지 만들기";
        syncMetadata('mini-header-center', articleTitle, null);
      }
      else if (target.classList.contains('p-inner-content')) {
        const paragraphs = Array.from(target.querySelectorAll('p'));
        if (paragraphs.length > 0) {
          sourceText = paragraphs.map(p => {
            let text = p.innerText || p.textContent;
            return text.trim() === "" ? "" : text;
          }).join('\n');
        } else {
          sourceText = target.innerText;
        }
        document.getElementById('source-text').value = sourceText;
        document.getElementById('char-counter').textContent = `${sourceText.length}자 입력됨`;
      }
      else if (target.classList.contains('mini-header-left')) {
        headerLeftText = target.textContent;
        syncMetadata('mini-header-left', headerLeftText, target);
      }

    document.addEventListener('paste', (e) => {
      const target = e.target;
      if (target.classList.contains('p-inner-content') || target.hasAttribute('contenteditable') || target.id === 'source-text') {
        e.preventDefault();
        let text = (e.clipboardData || window.clipboardData).getData('text/plain');
        
        text = text.replace(/\r\n/g, '\n');
        
        if (target.id === 'source-text') {
          text = text.replace(/\n{3,}/g, '\n\n');
          const start = target.selectionStart;
          const end = target.selectionEnd;
          const currentVal = target.value;
          target.value = currentVal.substring(0, start) + text + currentVal.substring(end);
          target.selectionStart = target.selectionEnd = start + text.length;
          target.dispatchEvent(new Event('input', { bubbles: true }));
        } else {
          if(!target.classList.contains('p-inner-content')) {
            text = text.replace(/\n/g, ' ');
          } else {
            text = text.replace(/\n{3,}/g, '\n\n');

          document.execCommand('insertText', false, text);
          target.dispatchEvent(new Event('input', { bubbles: true }));

      }

    function parseTextToManuscriptCells(text, cols) {
      const cells = [];
      const isAlphanumeric = (c) => /[0-9a-zA-Z]/.test(c);
      const isPunctuation = (c) => /[.,!?'"ным“”‘’()（）[\]{}<>~?;:：；]/.test(c);

      const paragraphs = text.split('\n');

      paragraphs.forEach((pText, pIdx) => {
        if (pText.trim() === "" && pIdx > 0) {
          const colIndex = cells.length % cols;
          if (colIndex > 0) {
            const fillCount = cols - colIndex;
            for (let f = 0; f < fillCount; f++) {
              cells.push({ char: "", isSpace: true, isParagraphFiller: true });
            }
          }
          for (let f = 0; f < cols; f++) {
            cells.push({ char: "", isSpace: true, isParagraphFiller: true });
          }
          return;
        }

        if (pIdx > 0) {
          const colIndex = cells.length % cols;
          if (colIndex > 0) {
            const fillCount = cols - colIndex;
            for (let f = 0; f < fillCount; f++) {
              cells.push({ char: "", isSpace: true, isParagraphFiller: true });
            }
          }
        }

        cells.push({ char: " ", isSpace: true, isParagraphStartSpace: true });

        let charIdx = 0;
        while (charIdx < pText.length) {
          let char = pText[charIdx];
          let colIndex = cells.length % cols;

          if (char === ' ') {
            if (colIndex === 0) {
              charIdx++;
              continue;
            }
            if (cells.length > 0) {
              const prevCell = cells[cells.length - 1];
              if (prevCell && (prevCell.char === '.' || prevCell.char === ',')) {
                charIdx++;
                continue;
              }
            }
            cells.push({ char: " ", isSpace: true });
            charIdx++;
            continue;
          }

          if (isAlphanumeric(char)) {
            let nextChar = pText[charIdx + 1];
            if (nextChar && isAlphanumeric(nextChar)) {
              cells.push({ char: char + nextChar, isAlphanumeric: true });
              charIdx += 2;
            } else {
              cells.push({ char: char, isAlphanumeric: true });
              charIdx += 1;
            }
            continue;
          }

          if (isPunctuation(char)) {
            if (colIndex === 0 && cells.length > 0) {
              let targetIdx = cells.length - 1;
              if (cells[targetIdx] && !cells[targetIdx].isParagraphFiller) {
                cells[targetIdx].squeezedPunct = char;
                cells[targetIdx].isSqueezed = true;
                charIdx++;
                continue;
              }
            }
          }

          cells.push({ char: char });
          charIdx++;
        }

        const endColIndex = cells.length % cols;
        if (endColIndex > 0) {
          const fillCount = cols - endColIndex;
          for (let f = 0; f < fillCount; f++) {
            cells.push({ char: "", isSpace: true, isParagraphFiller: true });
          }
        }
      });

      return cells;
    }

    function calculateOptimalRows(cols) {
      if (cols === "line") {
        return hideManuscriptHeader ? 23 : 19;
      }
      const colsNum = parseInt(cols);
      const cellWidthMm = 170 / colsNum;
      
      const usableHeightMm = hideManuscriptHeader ? 245 : 215;
      return Math.floor(usableHeightMm / cellWidthMm);
    }

    function estimateLinesForSegments(segments, fontSizePt) {
      const charWidthMm = fontSizePt * 0.3527; 
      const maxLineWidthMm = 170; 

      let totalLines = 0;

      function getCharWidthMm(char) {
        if (/[0-9a-zA-Z]/.test(char)) return charWidthMm * 0.58; 
        if (char === ' ') return charWidthMm * 0.35; 
        if (/[.,!?'"ным“”‘’()（）[\]{}<>~?;:：；]/.test(char)) return charWidthMm * 0.5; 
        return charWidthMm; 
      }

      const paragraphsToCalculate = [];
      let currentParaWords = [];
      let currentParaHasIndent = false;

      for (let i = 0; i < segments.length; i++) {
        const seg = segments[i];

        if (seg.isBlankLine) {
          if (currentParaWords.length > 0) {
            paragraphsToCalculate.push({
              words: currentParaWords,
              hasIndent: currentParaHasIndent
            });
            currentParaWords = [];
          }
          paragraphsToCalculate.push({ isBlankLine: true });
        } else {
          const prevSeg = i > 0 ? segments[i - 1] : null;
          const isNewParagraph = !prevSeg || prevSeg.isBlankLine || (prevSeg.pIdx !== seg.pIdx);

          if (isNewParagraph) {
            if (currentParaWords.length > 0) {
              paragraphsToCalculate.push({
                words: currentParaWords,
                hasIndent: currentParaHasIndent
              });
              currentParaWords = [];
            }
            currentParaHasIndent = !seg.isContinued;
          }

          const wordsInSeg = seg.text.split(' ');
          wordsInSeg.forEach((w, wIdx) => {
            if (w !== "") {
              currentParaWords.push(w);
            } else if (wIdx > 0 && wIdx < wordsInSeg.length - 1) {
              currentParaWords.push(""); 
            }
          });
        }
      }

      if (currentParaWords.length > 0) {
        paragraphsToCalculate.push({
          words: currentParaWords,
          hasIndent: currentParaHasIndent
        });
      }

      paragraphsToCalculate.forEach(p => {
        if (p.isBlankLine) {
          totalLines += 1.0;
          return;
        }

        const indentWidth = p.hasIndent ? (charWidthMm * 1.5) : 0;
        let currentLineWidth = indentWidth;
        let linesInPara = 1;

        p.words.forEach(word => {
          if (word === "") {
            currentLineWidth += getCharWidthMm(' ');
            return;
          }

          let wordWidth = 0;
          for (let char of word) {
            wordWidth += getCharWidthMm(char);
          }

          const spaceWidth = (currentLineWidth > indentWidth) ? getCharWidthMm(' ') : 0;

          if (currentLineWidth + spaceWidth + wordWidth > maxLineWidthMm) {
            linesInPara += 1;
            currentLineWidth = wordWidth;
          } else {
            currentLineWidth += spaceWidth + wordWidth;
          }
        });

        totalLines += linesInPara;
      });

      return totalLines;
    }

    function getMaxLines(fontSizePt, pageIdx) {
      const lineHeightMm = (fontSizePt * 2.2) * 0.3527; 
      const usableHeightMm = (pageIdx === 0) ? 175 : 195; 
      return Math.floor(usableHeightMm / lineHeightMm);
    }

    function canFitSinglePage(paragraphs, fontSizePt) {
      const segments = [];
      paragraphs.forEach((p, pIdx) => {
        if (p.trim() === "") {
          segments.push({ isBlankLine: true, pIdx: pIdx });
        } else {
          segments.push({ text: p.trim(), isContinued: false, pIdx: pIdx });
        }
      });
      const lines = estimateLinesForSegments(segments, fontSizePt);
      const maxLines = getMaxLines(fontSizePt, 0); 
      return lines <= maxLines;
    }

    function paginateSourceText(paragraphs) {
      let globalFontSize = '12pt';
      
      if (canFitSinglePage(paragraphs, 12)) {
        globalFontSize = '12pt';
      } else if (canFitSinglePage(paragraphs, 11)) {
        globalFontSize = '11pt';
      } else if (canFitSinglePage(paragraphs, 10)) {
        globalFontSize = '10pt';
      } else {
        globalFontSize = '12pt'; 
      }

      const fontSizeNum = parseInt(globalFontSize);

      const stream = [];
      paragraphs.forEach((p, pIdx) => {
        const trimmed = p.trim();
        if (trimmed === "") {
          stream.push({ type: 'blank', pIdx: pIdx });
        } else {
          const sentences = trimmed.split(/(?<=[.?!])\s+/);
          sentences.forEach((s, idx) => {
            if (s.trim() !== "") {
              stream.push({
                type: 'sentence',
                text: s.trim(),
                isParaStart: (idx === 0),
                pIdx: pIdx
              });
            }
          });
        }
      });

      const pages = [];
      let currentPageIdx = 0;
      let currentPageSegments = [];

      for (let i = 0; i < stream.length; i++) {
        const item = stream[i];
        let candidateSegments = [...currentPageSegments];
        let nextSegment;

        if (item.type === 'blank') {
          nextSegment = { isBlankLine: true, pIdx: item.pIdx };
        } else {
          const isContinued = !item.isParaStart;
          nextSegment = { text: item.text, isContinued: isContinued, pIdx: item.pIdx };
        }

        candidateSegments.push(nextSegment);

        const maxLines = getMaxLines(fontSizeNum, currentPageIdx);
        const estimated = estimateLinesForSegments(candidateSegments, fontSizeNum);

        if (estimated <= maxLines) {
          currentPageSegments.push(nextSegment);
        } else {
          if (currentPageSegments.length > 0) {
            pages.push({ segments: [...currentPageSegments], fontSize: globalFontSize });
            currentPageSegments = [];
            currentPageIdx++;

            if (item.type === 'sentence') {
              const isContinuedOnNewPage = !item.isParaStart;
              currentPageSegments.push({ text: item.text, isContinued: isContinuedOnNewPage, pIdx: item.pIdx });
            } else {
              currentPageSegments.push({ isBlankLine: true, pIdx: item.pIdx });
            }
          } else {
            currentPageSegments.push(nextSegment);
          }
        }
      }
      
      if (currentPageSegments.length > 0) {
        pages.push({ segments: currentPageSegments, fontSize: globalFontSize });
      }

      return pages;
    }

    function splitTextForLineNote(text, maxWidthMm) {
      const lines = [];
      const paragraphs = text.split('\n');
      const isPunct = (c) => /[.,!?'"ным“”('_~);:]/.test(c);
      
      paragraphs.forEach((p) => {
        if (p.trim() === "") {
          lines.push({ text: "", isFirstLine: false }); 
          return;
        }
        
        let currentLine = ""; 
        let currentWidthMm = 0; 
        let tempText = p; 
        let isFirstLine = true;
        
        for (let i = 0; i < tempText.length; i++) {
          const char = tempText[i];
          
          let charWidth = 5.3; 
          if (/[A-Z]/.test(char)) {
            charWidth = 4.0; 
          } else if (/[a-z]/.test(char)) {
            charWidth = 2.9; 
          } else if (/[0-9]/.test(char)) {
            charWidth = 2.9; 
          } else if (char === ' ') {
            charWidth = 1.8; 
          } else if (isPunct(char)) {
            charWidth = 2.4; 
          }

          const currentIndentLimit = isFirstLine ? 5.3 : 0;
          
          if (currentWidthMm + charWidth > (maxWidthMm - currentIndentLimit)) {
            let punctCount = 0;
            let punctStr = "";
            
            for (let j = i; j < tempText.length; j++) {
              if (isPunct(tempText[j])) {
                punctCount++;
                punctStr += tempText[j];
                if (punctCount === 3) break; 
              } else {
                break;
              }
            }
            
            if (punctCount > 0) {
              currentLine += punctStr;
              lines.push({ text: currentLine, isFirstLine: isFirstLine });
              i += (punctCount - 1); 
              currentLine = "";
              currentWidthMm = 0;
              isFirstLine = false;
            } else {
              lines.push({ text: currentLine, isFirstLine: isFirstLine });
              
              if (char === ' ') {
                currentLine = "";
                currentWidthMm = 0;
              } else {
                currentLine = char;
                currentWidthMm = charWidth;
              }
              isFirstLine = false;
            }
          } else {
            if (currentWidthMm === 0 && !isFirstLine && char === ' ') {
              continue;
            }
            currentLine += char;
            currentWidthMm += charWidth;
          }
        }
        if (currentLine) {
          lines.push({ text: currentLine, isFirstLine: isFirstLine });
        }
      });
      return lines;
    }

    function renderPages() {

      const optRows = calculateOptimalRows(gridCols);

      const placeholders = getBlankPlaceholders();

          }

          const pInnerContent = document.createElement('div');
          pInnerContent.className = "font-serif-fixed text-slate-800 leading-[2.2] font-medium w-full text-justify p-inner-content outline-none";
          pInnerContent.setAttribute('contenteditable', 'true');
          pInnerContent.style.textJustify = "inter-character";

          const htmlParagraphs = [];
          let currentParaText = "";

          let currentParaId = null;

          pageData.segments.forEach(seg => {
            if (seg.isBlankLine) {
              if (currentParaText !== "") {

            }

        cellsData = parseTextToManuscriptCells(sourceText, colsNum);
        totalGridPages = Math.ceil(cellsData.length / cellsPerPage);
        if (totalGridPages === 0) totalGridPages = 1;
      }

      const hasGuide = document.getElementById('pattern-guide').checked;
      const hasEmpty = document.getElementById('pattern-empty').checked;

      let renderingModes = [];
      if (hasGuide) renderingModes.push('guide');
      if (hasEmpty) renderingModes.push('empty');

      if (renderingModes.length === 0) {
        renderingModes.push('empty');

      renderingModes.forEach(currentMode => {
        for (let pageIdx = 0; pageIdx < totalGridPages; pageIdx++) {
          const gridPageDiv = document.createElement('div');
          gridPageDiv.className = "a4-page print-page";

          if (!hideManuscriptHeader) {
            const gridPageHeader = document.createElement('div');
            gridPageHeader.className = `pb-1 text-sm font-semibold ${gridTextColorClass} w-full shrink-0 mb-2`;
            // 3분할 Grid 레이아웃 적용 및 세로막대 삭제
            gridPageHeader.innerHTML = `
              <div class="grid grid-cols-3 items-end w-full min-h-[24px] text-slate-800 text-sm font-bold header-meta-container">
                <span class="school-placeholder text-left whitespace-normal break-keep" contenteditable="true">${placeholders.school}</span>
                <span class="grade-placeholder text-center whitespace-normal break-keep" contenteditable="true">${placeholders.grade}</span>
                <span class="date-placeholder text-right whitespace-normal break-keep" contenteditable="true">${placeholders.date}</span>
              </div>
              <div class="mt-2.5 flex items-center border-2 ${gridBorderColorClass} rounded-lg px-4 py-1.5 bg-slate-50/50 justify-between h-10">
                <span class="text-sm font-extrabold text-slate-700 shrink-0 mr-4">이름 :</span>

            `;
            gridPageDiv.appendChild(gridPageHeader);

            const gridPageTitle = document.createElement('div');
            gridPageTitle.className = "mt-5 mb-1 w-full text-left shrink-0";
            gridPageTitle.style.marginBottom = "2mm";
            
            const titleBorderClass = isLineNote ? "" : "border-b border-dashed border-slate-300 pb-1 leading-tight";
            gridPageTitle.innerHTML = `
              <h2 class="title-placeholder font-serif-fixed text-xl font-bold tracking-wide text-slate-800 ${titleBorderClass} max-w-[95%] break-keep whitespace-normal" contenteditable="true" style="word-break: keep-all;">${articleTitle ? articleTitle : ''}</h2>
            `;
            gridPageDiv.appendChild(gridPageTitle);
          } else {
            const miniHeader = document.createElement('div');
            miniHeader.className = `mt-1 mb-2 pb-1.5 border-b border-dashed ${gridBorderColorClass} grid grid-cols-3 items-center text-xs ${gridTextColorClass} opacity-80 font-serif-fixed shrink-0 w-full`;
            
            const typeText = isLineNote ? '줄 노트' : `${gridCols}칸 원고지`;
            miniHeader.innerHTML = `
              <span class="mini-header-left text-left tracking-wider opacity-90 text-[11px] font-medium" contenteditable="true">${headerLeftText}</span>
              <span class="mini-header-center text-center font-bold tracking-widest text-slate-800 text-[13px] px-2 break-keep whitespace-normal leading-tight" contenteditable="true" style="word-break: keep-all;">${articleTitle || '별 헤는 밤'}</span>
              <span class="mini-header-right text-right tracking-wider opacity-70 text-[10px] font-medium">${typeText}</span>
            `;
            gridPageDiv.appendChild(miniHeader);
          }

          const gridWrapper = document.createElement('div');
          gridWrapper.className = "w-full my-0 flex items-center justify-center"; 

          if (isLineNote) {
            const noteContainer = document.createElement('div');
            noteContainer.className = `w-full border-t-2 ${gridBorderColorClass} flex flex-col justify-start relative`;
            
            const startLineIdx = pageIdx * optRows;

            for (let r = 0; r < optRows; r++) {
              const lineIdx = startLineIdx + r;
              const lineObj = linesData[lineIdx] || { text: "", isFirstLine: false };
              const lineText = lineObj.text;

              const rowDiv = document.createElement('div');
              
              const isLastRow = (r === optRows - 1);
              const borderThicknessClass = isLastRow ? "border-b-[3px]" : "border-b";
              rowDiv.className = `${borderThicknessClass} ${gridBorderColorClass} w-full shrink-0 relative`;
              rowDiv.style.height = "10mm";

              if (currentMode === 'guide' && lineText) {
                const textSpan = document.createElement('div');
                textSpan.textContent = lineText;
                
                textSpan.className = "font-serif-fixed text-slate-300 font-medium select-none tracking-wide absolute inset-x-2 bottom-[2px] leading-normal pb-0 whitespace-pre text-justify";
                textSpan.style.textJustify = "inter-character";
                textSpan.style.textIndent = lineObj.isFirstLine ? "1em" : "0"; 
                textSpan.style.fontSize = "15pt";
                rowDiv.appendChild(textSpan);
              }

              noteContainer.appendChild(rowDiv);
            }

            gridWrapper.appendChild(noteContainer);

          } else {
            const colsNum = parseInt(gridCols);

            const relativeContainer = document.createElement('div');
            relativeContainer.className = "relative w-full flex items-center justify-center";

            const gridBody = document.createElement('div');
            gridBody.className = `grid gap-0 border-2 ${gridBorderColorClass}`;
            gridBody.style.gridTemplateColumns = `repeat(${colsNum}, minmax(0, 1fr))`;
            gridBody.style.gridTemplateRows = `repeat(${optRows}, minmax(0, 1fr))`;

            const cellWidthMm = 170 / colsNum;
            gridBody.style.width = "170mm";
            gridBody.style.height = `${optRows * cellWidthMm}mm`;

            const startIdx = pageIdx * cellsPerPage;

            for (let r = 0; r < optRows; r++) {
              for (let c = 0; c < colsNum; c++) {
                const cellIdx = startIdx + (r * colsNum + c);
                const cellData = cellsData[cellIdx] || { char: "" };

                const cell = document.createElement('div');
                cell.className = `grid-cell-guide border-b border-r ${gridBorderColorClass} flex items-center justify-center relative aspect-square`;
                
                if (c === colsNum - 1) cell.classList.remove('border-r');
                if (r === optRows - 1) cell.classList.remove('border-b');

                if (currentMode === 'guide' && cellData.char && cellData.char !== " ") {
                  const dynamicFontSize = cellWidthMm * 0.65;
                  
                  if (cellData.isSqueezed) {
                    const containerSpan = document.createElement('div');
                    containerSpan.className = "absolute inset-0 flex items-center justify-center gap-x-[1px] translate-y-[8%] px-[3%] w-full h-full";
                    
                    const isCharPunct = /[.,!?'"ными“”‘’()（）[\]{}<>~?;:：；]/.test(cellData.char);
                    const isPunctPunct = /[.,!?'"ными“”‘’()（）[\]{}<>~?;:：；]/.test(cellData.squeezedPunct);

                    const charSpan = document.createElement('span');
                    charSpan.textContent = cellData.char; 
                    charSpan.className = "font-serif-fixed text-slate-300 font-medium select-none leading-none";
                    
                    const punctSpan = document.createElement('span');
                    punctSpan.textContent = cellData.squeezedPunct || "";
                    punctSpan.className = "font-serif-fixed text-slate-300 font-medium select-none leading-none";

                    if (isCharPunct && isPunctPunct) {
                      charSpan.style.fontSize = `${dynamicFontSize * 1.0}mm`;
                      punctSpan.style.fontSize = `${dynamicFontSize * 1.0}mm`;
                    } else {
                      charSpan.style.fontSize = `${dynamicFontSize * 0.95}mm`;
                      punctSpan.style.fontSize = `${dynamicFontSize * 0.85}mm`;
                      
                      if (cellData.squeezedPunct === '.' || cellData.squeezedPunct === ',') {
                        punctSpan.className += " translate-y-[12%]";
                      }
                    }
                    
                    containerSpan.appendChild(charSpan);
                    containerSpan.appendChild(punctSpan);
                    cell.appendChild(containerSpan);
                  } else {
                    const charSpan = document.createElement('span');
                    charSpan.textContent = cellData.char;

                    if (cellData.char === '.' || cellData.char === ',') {
                      charSpan.className = "font-serif-fixed text-slate-300 font-extrabold select-none absolute left-[10%] bottom-[10%] leading-none";
                      charSpan.style.fontSize = `${dynamicFontSize * 0.8}mm`;
                    } else {
                      charSpan.className = "font-serif-fixed text-slate-300 font-medium select-none absolute inset-0 flex items-center justify-center leading-none translate-y-[8%]";
                      charSpan.style.fontSize = `${dynamicFontSize}mm`;
                    }
                    cell.appendChild(charSpan);
                  }
                }

                gridBody.appendChild(cell);
              }
            }
            relativeContainer.appendChild(gridBody);

            const pageOffset = pageIdx * cellsPerPage;
            for (let r = 0; r < optRows; r++) {
              const cumulativeCellCount = pageOffset + (r + 1) * colsNum;
              if (cumulativeCellCount % 100 === 0) {
                const label = document.createElement('div');
                label.className = `absolute text-[10px] ${gridTextColorClass} font-mono font-bold opacity-75 flex items-center justify-start pointer-events-none`;
                label.style.right = "-32px";
                label.style.width = "25px";
                label.style.height = `${100 / optRows}%`;
                label.style.top = `${(r * 100) / optRows}%`;
                label.textContent = cumulativeCellCount;
                relativeContainer.appendChild(label);
              }
            }

            gridWrapper.appendChild(relativeContainer);
          }

          gridPageDiv.appendChild(gridWrapper);

          // Absolute footer 기법 적용
          const footerDiv = document.createElement('div');
          
          const footerBorderClass = isLineNote ? "" : `border-t border-dashed ${gridBorderColorClass}`;
          footerDiv.className = `absolute bottom-[15mm] left-[20mm] right-[20mm] pt-2 ${footerBorderClass} flex justify-between items-center text-xs text-slate-400 font-bold shrink-0`;
          
          let currentFooterLabel = "";
          let currentFooterClass = "";
          if (isLineNote) {
            if (currentMode === 'guide') {
              currentFooterLabel = footerGuideText + " - 줄 노트";
              currentFooterClass = "footer-label-guide";
            } else {
              currentFooterLabel = footerEmptyText + " - 줄 노트";
              currentFooterClass = "footer-label-empty";
            }
          } else {
            if (currentMode === 'guide') {
              currentFooterLabel = footerGuideText;
              currentFooterClass = "footer-label-guide";
            } else {
              currentFooterLabel = footerEmptyText;
              currentFooterClass = "footer-label-empty";
            }
          }

          footerDiv.innerHTML = `
            <span class="tracking-wide text-slate-400">[ <span class="${currentFooterClass}" contenteditable="true">${currentFooterLabel}</span> ]</span>
            <span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full">- ${pageIdx + 1} / ${totalGridPages} -</span>
          `;
          gridPageDiv.appendChild(footerDiv);

          container.appendChild(gridPageDiv);
        }
      });

      updateHeaderAndTitle();
    }

    renderPages();
  </script>
</body>
</html>
