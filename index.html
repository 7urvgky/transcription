            <div class="name-placeholder-container flex-1 flex justify-center items-center min-w-[100px]">
              ${studentName.trim() 
                ? `<span class="name-placeholder text-slate-900 text-base font-extrabold flex-1 text-center tracking-[1em] pl-[1em]" contenteditable="true">${studentName}</span>`
                : `<span class="name-placeholder text-slate-400 text-base font-medium flex-1 text-center tracking-normal" contenteditable="true"></span>`
              }
            </div>
          </div>
        </div>
      `;

      // -------------------------------------------------------------
      // 제 1 페이지 그룹: 원문을 깔끔하게 수록한 [원문 읽기 판]
      // -------------------------------------------------------------
      if (!excludeFirstPage) {
        const paragraphs = sourceText.split('\n');
        const sourcePages = paginateSourceText(paragraphs);

        sourcePages.forEach((pageData, sIdx) => {
          const pageOneDiv = document.createElement('div');
          pageOneDiv.className = pageClass;

          const innerDiv = document.createElement('div');
          innerDiv.className = "print-page-inner";

          if (sIdx === 0) {
            const pageOneHeader = document.createElement('div');
            pageOneHeader.className = "pb-1 text-sm font-semibold custom-grid-text w-full shrink-0 mb-2";
            pageOneHeader.innerHTML = headerHTML;
            innerDiv.appendChild(pageOneHeader);

            const pageOneTitle = document.createElement('div');
            pageOneTitle.className = "mt-4 mb-2 w-full text-left shrink-0";
            pageOneTitle.innerHTML = `
              <h2 class="title-placeholder font-serif-fixed text-2xl font-bold tracking-wide text-slate-800 pb-1 leading-tight max-w-[95%] break-keep whitespace-normal" contenteditable="true" style="word-break: keep-all;">${articleTitle ? articleTitle : ''}</h2>
            `;
            innerDiv.appendChild(pageOneTitle);
          } else {
            const pageOneHeader = document.createElement('div');
            pageOneHeader.className = "pb-2 border-b border-dashed custom-grid-border grid grid-cols-3 items-center text-xs custom-grid-text opacity-80 font-serif-fixed shrink-0 w-full mb-4";
            pageOneHeader.innerHTML = `
              <span class="mini-header-left text-left tracking-wider opacity-90 text-[11px] font-medium" contenteditable="true">${headerLeftText}</span>
              <span class="mini-header-center text-center font-bold tracking-widest text-slate-800 text-[13px] px-2 break-keep whitespace-normal leading-tight" contenteditable="true" style="word-break: keep-all;">${articleTitle ? articleTitle : ''}</span>
              <span class="text-right"></span>
            `;
            innerDiv.appendChild(pageOneHeader);
          }

          const pageOneBody = document.createElement('div');
          pageOneBody.className = "w-full flex flex-col justify-start items-center mb-[15mm]";
          
          pageOneBody.style.height = "auto";
          if (orientation === 'portrait') {
            pageOneBody.style.maxHeight = (sIdx === 0) ? "190mm" : "210mm";
          } else {
            pageOneBody.style.maxHeight = (sIdx === 0) ? "118mm" : "142mm";
          }
          pageOneBody.style.minHeight = "0";

          const frameDiv = document.createElement('div');
          const totalSourcePages = sourcePages.length;
          
          // 원문 읽기 테두리는 opacity에 관계없이 언제나 100% solid 선으로 렌더링되도록 custom-grid-border 유지
          let borderClasses = "border-2 border-solid custom-grid-border bg-white flex flex-col justify-stretch p-6 w-full h-auto";
          if (totalSourcePages > 1) {
            if (sIdx === 0) {
              borderClasses += " border-b-0 rounded-t-xl rounded-b-none";
            } else if (sIdx === totalSourcePages - 1) {
              borderClasses += " border-t-0 rounded-b-xl rounded-t-none";
            } else {
              borderClasses += " border-t-0 border-b-0 rounded-none";
            }
          } else {
            borderClasses += " rounded-xl";
          }
          frameDiv.className = borderClasses;

          const pInnerContent = document.createElement('div');
          pInnerContent.className = "font-serif-fixed text-slate-800 leading-[2.2] font-medium w-full text-justify p-inner-content outline-none";
          pInnerContent.style.textJustify = "inter-character";
          pInnerContent.style.wordBreak = "keep-all";
          pInnerContent.style.fontSize = pageData.fontSize; 
          pInnerContent.style.height = "auto";

          const fontSizeNum = parseInt(pageData.fontSize);
          const maxLinesOnThisPage = (orientation === 'portrait') 
            ? ((sIdx === 0) ? getMaxLines(fontSizeNum, 0) : getMaxLines(fontSizeNum, 1))
            : ((sIdx === 0) ? getMaxLines(fontSizeNum, 0) / 2 : getMaxLines(fontSizeNum, 1) / 2); 
          
          const lineHeightMm = fontSizeNum * 2.2 * 0.352778;
          const maxContentHeightMm = maxLinesOnThisPage * lineHeightMm;

          pInnerContent.style.maxHeight = `${maxContentHeightMm}mm`;
          pInnerContent.style.overflow = "hidden"; 

          if (orientation === 'landscape') {
            pInnerContent.style.columnCount = "2";
            pInnerContent.style.columnGap = "15mm";
            pInnerContent.style.columnFill = "auto"; 
          } else {
            pInnerContent.style.columnCount = "auto";
            pInnerContent.style.columnGap = "normal";
            pInnerContent.style.columnFill = "balance";
          }

          const htmlParagraphs = [];
          let currentParaText = "";
          let isContinuedPara = false;
          let currentParaId = null;

          pageData.segments.forEach(seg => {
            if (seg.isBlankLine) {
              if (currentParaText !== "") {
                htmlParagraphs.push({ text: currentParaText, isContinued: isContinuedPara, pIdx: currentParaId });
                currentParaText = "";
                currentParaId = null;
              }
              htmlParagraphs.push({ isBlank: true });
            } else {
              if (currentParaText === "") {
                isContinuedPara = seg.isContinued;
                currentParaText = seg.text;
                currentParaId = seg.pIdx;
              } else if (currentParaId !== seg.pIdx) {
                htmlParagraphs.push({ text: currentParaText, isContinued: isContinuedPara, pIdx: currentParaId });
                isContinuedPara = seg.isContinued;
                currentParaText = seg.text;
                currentParaId = seg.pIdx;
              } else {
                currentParaText += " " + seg.text;
              }
            }
          });
          if (currentParaText !== "") {
            htmlParagraphs.push({ text: currentParaText, isContinued: isContinuedPara, pIdx: currentParaId });
          }

          htmlParagraphs.forEach(p => {
            if (p.isBlank) {
              const emptySpacer = document.createElement('p');
              emptySpacer.className = "mb-0 text-justify";
              emptySpacer.innerHTML = "&nbsp;"; 
              pInnerContent.appendChild(emptySpacer);
            } else {
              const paraEl = document.createElement('p');
              paraEl.className = "mb-0 text-justify"; 
              paraEl.style.textIndent = p.isContinued ? "0" : "1.5em";
              paraEl.style.wordBreak = "keep-all";
              paraEl.style.textJustify = "inter-character";
              paraEl.textContent = p.text;
              pInnerContent.appendChild(paraEl);
            }
          });

          frameDiv.appendChild(pInnerContent);
          pageOneBody.appendChild(frameDiv);
          innerDiv.appendChild(pageOneBody);

          // 꼬리말, 페이지 번호 표시 안 함 분기 처리
          if (!hidePageNumbers) {
            const pageOneFooter = document.createElement('div');
            pageOneFooter.className = "absolute bottom-[18mm] left-[20mm] right-[20mm] pt-2.5 flex justify-between items-center text-xs text-slate-400 font-bold shrink-0";
            pageOneFooter.innerHTML = `
              <span class="tracking-wide text-slate-400"><span class="footer-label-source" contenteditable="true">${footerSourceText}</span></span>
              <span class="bg-emerald-50 text-emerald-800 px-3.5 py-1 rounded-full border border-emerald-100">${sIdx + 1} / ${totalSourcePages}</span>
            `;
            innerDiv.appendChild(pageOneFooter);
          }

          pageOneDiv.appendChild(innerDiv);
          container.appendChild(pageOneDiv);
        });
      }

      let cellsData = [];
      let linesData = [];
      let totalGridPages = 1;

      if (isLineNote) {
        const maxNonSpace = (orientation === 'portrait') ? 25 : 33;
        linesData = splitTextForLineNote(sourceText, maxNonSpace);
        totalGridPages = Math.ceil(linesData.length / optRows);
        if (totalGridPages === 0) totalGridPages = 1;
      } else {
        const colsNum = parseInt(gridCols);
        cellsData = parseTextToManuscriptCells(sourceText, colsNum);
        totalGridPages = Math.ceil(cellsData.length / cellsPerPage);
        if (totalGridPages === 0) totalGridPages = 1;
      }

      const hasGuide = document.getElementById('pattern-guide').checked;
      const hasEmpty = document.getElementById('pattern-empty').checked;

      let renderingModes = [];
      if (hasGuide) renderingModes.push('guide');
      if (hasEmpty) renderingModes.push('empty');

      if (renderingModes.length === 0) {
        renderingModes.push('empty');
      }

      renderingModes.forEach(currentMode => {
        for (let pageIdx = 0; pageIdx < totalGridPages; pageIdx++) {
          const gridPageDiv = document.createElement('div');
          gridPageDiv.className = pageClass;

          const innerDiv = document.createElement('div');
          innerDiv.className = "print-page-inner";

          if (!hideManuscriptHeader) {
            const gridPageHeader = document.createElement('div');
            gridPageHeader.className = "pb-1 text-sm font-semibold custom-grid-text w-full shrink-0 mb-2";
            gridPageHeader.innerHTML = headerHTML;
            innerDiv.appendChild(gridPageHeader);

            const gridPageTitle = document.createElement('div');
            gridPageTitle.className = "mt-3 mb-1 w-full text-left shrink-0";
            gridPageTitle.style.marginBottom = "2mm"; 
            
            gridPageTitle.innerHTML = `
              <div class="border-b custom-grid-border pb-1">
                <h2 class="title-placeholder font-serif-fixed text-xl font-bold tracking-wide text-slate-800 leading-tight max-w-[95%] break-keep whitespace-normal" contenteditable="true" style="word-break: keep-all;">${articleTitle ? articleTitle : ''}</h2>
              </div>
            `;
            innerDiv.appendChild(gridPageTitle);
          } else {
            // '이름 등 표시 안 함'을 선택했을 때 얇은 테두리와 정돈된 마진 적용 (3mm 간격)
            const singleLine = document.createElement('div');
            singleLine.className = "w-full border-t border-solid custom-grid-border mb-[3mm] shrink-0";
            innerDiv.appendChild(singleLine);
          }

          const gridWrapper = document.createElement('div');
          if (hideManuscriptHeader) {
            // 아래쪽 가로선 밀착을 위해 불필요한 mb-auto 제거 및 flex 정렬 적용
            gridWrapper.className = "w-full flex items-center justify-center"; 
          } else {
            gridWrapper.className = "w-full my-0 flex items-center justify-center"; 
          }

          if (isLineNote) {
            const usableWidthMm = (orientation === 'portrait') ? 162 : 249;
            const relativeContainer = document.createElement('div');
            relativeContainer.className = "relative mx-auto";
            relativeContainer.style.width = `${usableWidthMm}mm`;
            relativeContainer.style.height = `${optRows * 10}mm`;

            const noteContainer = document.createElement('div');
            // 줄노트의 본체 선들에는 슬라이더 투명도를 매핑하기 위해 manuscript-grid-border 클래스 적용
            noteContainer.className = "w-full h-full border-t-2 manuscript-grid-border flex flex-col justify-start relative";
            
            const startLineIdx = pageIdx * optRows;

            for (let r = 0; r < optRows; r++) {
              const lineIdx = startLineIdx + r;
              const lineObj = linesData[lineIdx] || { text: "", isFirstLine: false, isLastLineOfPara: true };
              const lineText = lineObj.text;

              const rowDiv = document.createElement('div');
              
              const isLastRow = (r === optRows - 1);
              const borderThicknessClass = isLastRow ? "border-b-[3px]" : "border-b";
              rowDiv.className = `${borderThicknessClass} manuscript-grid-border w-full shrink-0 relative`;
              rowDiv.style.height = "10mm";

              if (currentMode === 'guide' && lineText) {
                const textSpan = document.createElement('div');
                textSpan.textContent = lineText;
                
                textSpan.className = "font-serif-fixed text-slate-300 font-medium select-none absolute left-[2mm] right-[2mm] bottom-[1.8mm] leading-none pb-0 whitespace-pre";
                textSpan.style.textAlign = "justify";
                textSpan.style.textJustify = "inter-character";

                if (lineObj.isLastLineOfPara) {
                  textSpan.style.textAlignLast = "left";
                } else {
                  textSpan.style.textAlignLast = "justify";
                }

                textSpan.style.textIndent = lineObj.isFirstLine ? "1.2em" : "0"; 

                const baseFontSizeMm = (orientation === 'portrait') ? 5.2 : 6.2;
                const fontSizeNum = 12; 
                const adjustedFontSizeMm = baseFontSizeMm * (fontSizeNum / 12);
                textSpan.style.fontSize = `${adjustedFontSizeMm}mm`;
                textSpan.style.transform = "translateY(var(--char-y-offset, 0%))"; 
                rowDiv.appendChild(textSpan);
              }

              noteContainer.appendChild(rowDiv);
            }

            relativeContainer.appendChild(noteContainer);
            gridWrapper.appendChild(relativeContainer);

          } else {
            const colsNum = parseInt(gridCols);

            const usableWidthMm = (orientation === 'portrait') ? 170 : 257;
            const cellWidthMm = usableWidthMm / colsNum;
            const relativeContainer = document.createElement('div');
            relativeContainer.className = "relative mx-auto block";
            relativeContainer.style.width = `${usableWidthMm}mm`;
            relativeContainer.style.height = `${optRows * cellWidthMm}mm`;

            const gridBody = document.createElement('div');
            // 원고지 격자 테두리(border-2) 역시 opacity 조절 시 함께 페이드되어야 하므로 manuscript-grid-border 바인딩
            gridBody.className = "grid gap-0 border-2 manuscript-grid-border w-full h-full";
            gridBody.style.gridTemplateColumns = `repeat(${colsNum}, minmax(0, 1fr))`;
            gridBody.style.gridTemplateRows = `repeat(${optRows}, minmax(0, 1fr))`;

            const startIdx = pageIdx * cellsPerPage;

            for (let r = 0; r < optRows; r++) {
              for (let c = 0; c < colsNum; c++) {
                const cellIdx = startIdx + (r * colsNum + c);
                const cellData = cellsData[cellIdx] || { char: "" };

                const cell = document.createElement('div');
                // 원고지 각 셀의 테두리(boder-b, border-r)에는 실시간 투명도가 상시 적용되도록 manuscript-grid-border 장착
                cell.className = "grid-cell-guide border-b border-r manuscript-grid-border flex items-center justify-center relative aspect-square";
                
                if (c === colsNum - 1) cell.classList.remove('border-r');
                if (r === optRows - 1) cell.classList.remove('border-b');

                if (currentMode === 'guide' && cellData.char && cellData.char !== " ") {
                  // 따라쓰기 글자가 십자 가이드선보다 위에 겹쳐 그려지도록 style="z-index: 10;"을 명시적으로 추가
                  let svgHtml = `<svg viewBox="0 0 100 100" class="w-full h-full select-none absolute inset-0 pointer-events-none" style="z-index: 10;">`;
                  svgHtml += `<g style="transform: translateY(var(--char-y-offset, 0%));">`;

                  if (cellData.isSqueezed) {
                    const mainChar = cellData.char;
                    svgHtml += `<text x="38" y="50" dominant-baseline="central" text-anchor="middle" font-size="62" class="font-serif-fixed fill-current text-slate-300 font-medium">${mainChar}</text>`;

                    const puncts = Array.from(cellData.squeezedPunct || "");
                    if (puncts.length === 1) {
                      const p = puncts[0];
                      if (p === '.' || p === ',') {
                        svgHtml += `<text x="78" y="49" dominant-baseline="central" text-anchor="middle" font-size="56" class="font-serif-fixed fill-current text-slate-300 font-bold">${p}</text>`;
                      } else if (p === '!' || p === '?') {
                        svgHtml += `<text x="76" y="50" dominant-baseline="central" text-anchor="middle" font-size="56" class="font-serif-fixed fill-current text-slate-300 font-medium">${p}</text>`;
                      } else if (p === '"' || p === "'" || p === '”' || p === '’') {
                        svgHtml += `<text x="76" y="41" dominant-baseline="central" text-anchor="middle" font-size="56" class="font-serif-fixed fill-current text-slate-300 font-medium">${p}</text>`;
                      } else {
                        svgHtml += `<text x="76" y="50" dominant-baseline="central" text-anchor="middle" font-size="54" class="font-serif-fixed fill-current text-slate-300 font-medium">${p}</text>`;
                      }
                    } else if (puncts.length === 2) {
                      const p1 = puncts[0];
                      const p2 = puncts[1];

                      let y1 = 50, y2 = 50;
                      let fontSize = 46;
                      
                      if (p1 === '.' || p1 === ',') y1 = 49; 
                      if (p2 === '.' || p2 === ',') y2 = 49; 
                      if (p1 === '"' || p1 === "'" || p1 === '”' || p1 === '’') y1 = 41; 
                      if (p2 === '"' || p2 === "'" || p2 === '”' || p2 === '’') y2 = 41; 

                      svgHtml += `<text x="68" y="${y1}" dominant-baseline="central" text-anchor="middle" font-size="${fontSize}" class="font-serif-fixed fill-current text-slate-300 font-medium">${p1}</text>`;
                      svgHtml += `<text x="86" y="${y2}" dominant-baseline="central" text-anchor="middle" font-size="${fontSize}" class="font-serif-fixed fill-current text-slate-300 font-medium">${p2}</text>`;
                    } else {
                      puncts.forEach((p, idx) => {
                        const x = 64 + idx * 12;
                        let y = 50;
                        if (p === '.' || p === ',') y = 49; 
                        if (p === '"' || p === "'" || p === '”' || p === '’') y = 41; 
                        svgHtml += `<text x="${x}" y="${y}" dominant-baseline="central" text-anchor="middle" font-size="38" class="font-serif-fixed fill-current text-slate-300 font-medium">${p}</text>`;
                      });
                    }
                  } else if (cellData.isPeriodQuoteCombo) {
                    const p1 = cellData.char;
                    const p2 = cellData.squeezedPunct;
                    svgHtml += `<text x="25" y="54" dominant-baseline="central" text-anchor="middle" font-size="62" class="font-serif-fixed fill-current text-slate-300 font-bold">${p1}</text>`;
                    svgHtml += `<text x="78" y="45" dominant-baseline="central" text-anchor="middle" font-size="62" class="font-serif-fixed fill-current text-slate-300 font-medium">${p2}</text>`;
                  } else if (cellData.isPeriodOpeningQuoteCombo) {
                    const p1 = cellData.char;
                    const p2 = cellData.squeezedPunct;
                    svgHtml += `<text x="25" y="54" dominant-baseline="central" text-anchor="middle" font-size="62" class="font-serif-fixed fill-current text-slate-300 font-bold">${p1}</text>`;
                    svgHtml += `<text x="64" y="45" dominant-baseline="central" text-anchor="middle" font-size="62" class="font-serif-fixed fill-current text-slate-300 font-medium">${p2}</text>`;
                  } else if (cellData.isSymbolFirstCombo) {
                    const p1 = cellData.char;
                    const p2 = cellData.squeezedPunct;
                    svgHtml += `<text x="30" y="50" dominant-baseline="central" text-anchor="middle" font-size="56" class="font-serif-fixed fill-current text-slate-300 font-medium">${p1}</text>`;
                    svgHtml += `<text x="74" y="41" dominant-baseline="central" text-anchor="middle" font-size="62" class="font-serif-fixed fill-current text-slate-300 font-medium">${p2}</text>`;
                  } else if (cellData.isQuoteFirstCombo) {
                    const p1 = cellData.char;
                    const p2 = cellData.squeezedPunct;
                    svgHtml += `<text x="28" y="41" dominant-baseline="central" text-anchor="middle" font-size="62" class="font-serif-fixed fill-current text-slate-300 font-medium">${p1}</text>`;
                    svgHtml += `<text x="68" y="50" dominant-baseline="central" text-anchor="middle" font-size="56" class="font-serif-fixed fill-current text-slate-300 font-medium">${p2}</text>`;
                  } else if (cellData.isDoublePunct) {
                    const p1 = cellData.char;
                    const p2 = cellData.squeezedPunct;
                    let y1 = 50, y2 = 50;
                    let fontSize = 46;
                    
                    if (p1 === '.' || p1 === ',') y1 = 54; 
                    if (p2 === '.' || p2 === ',') y2 = 54; 
                    if (p1 === '"' || p1 === "'" || p1 === '”' || p1 === '’') y1 = 45; 
                    if (p2 === '"' || p2 === "'" || p2 === '”' || p2 === '’') y2 = 45; 
                    if (p1 === '“' || p1 === '‘') y1 = 45;
                    if (p2 === '“' || p2 === '‘') y2 = 45;

                    svgHtml += `<text x="32" y="${y1}" dominant-baseline="central" text-anchor="middle" font-size="${fontSize}" class="font-serif-fixed fill-current text-slate-300 font-medium">${p1}</text>`;
                    svgHtml += `<text x="68" y="${y2}" dominant-baseline="central" text-anchor="middle" font-size="${fontSize}" class="font-serif-fixed fill-current text-slate-300 font-medium">${p2}</text>`;
                  } else {
                    const char = cellData.char;
                    if (char === '.' || char === ',') {
                      svgHtml += `<text x="25" y="54" dominant-baseline="central" text-anchor="middle" font-size="62" class="font-serif-fixed fill-current text-slate-300 font-bold">${char}</text>`;
                    } else if (char === '“' || char === '‘') {
                      svgHtml += `<text x="75" y="45" dominant-baseline="central" text-anchor="middle" font-size="62" class="font-serif-fixed fill-current text-slate-300 font-medium">${char}</text>`;
                    } else if (char === '”' || char === '’') {
                      svgHtml += `<text x="25" y="45" dominant-baseline="central" text-anchor="middle" font-size="62" class="font-serif-fixed fill-current text-slate-300 font-medium">${char}</text>`;
                    } else {
                      svgHtml += `<text x="50" y="50" dominant-baseline="central" text-anchor="middle" font-size="62" class="font-serif-fixed fill-current text-slate-300 font-medium">${char}</text>`;
                    }
                  }

                  svgHtml += `</g></svg>`; 
                  cell.innerHTML = svgHtml;
                }

                gridBody.appendChild(cell);
              }
            }
            relativeContainer.appendChild(gridBody);

            if (!hideCharCount) {
              const pageOffset = pageIdx * cellsPerPage;
              for (let r = 0; r < optRows; r++) {
                const rowStartCell = pageOffset + r * colsNum;
                const rowEndCell = pageOffset + (r + 1) * colsNum;
                
                const currentMaxMultiplesCount = Math.floor(rowEndCell / 100);
                
                for (let k = 1; k <= currentMaxMultiplesCount; k++) {
                  const targetBaseValue = 100 * k;
                  
                  if (targetBaseValue > rowStartCell && targetBaseValue <= rowEndCell) {
                    const labelVal = rowEndCell; 
                    
                    const label = document.createElement('div');
                    // 글자 수 안내 표시 텍스트는 불투명도에 무관하게 항상 가독성이 높도록 solid 색상(custom-grid-text) 바인딩
                    label.className = "absolute text-[10px] custom-grid-text font-mono font-bold opacity-75 flex items-center justify-start pointer-events-none";
                    label.style.right = "-32px";
                    label.style.width = "25px";
                    label.style.height = `${100 / optRows}%`;
                    label.style.top = `${(r * 100) / optRows}%`;
                    label.textContent = labelVal;
                    relativeContainer.appendChild(label);
                    break; 
                  }
                }
              }
            }

            gridWrapper.appendChild(relativeContainer);
          }

          innerDiv.appendChild(gridWrapper);

          if (hideManuscriptHeader) {
            // 상단 가로선(mb-[3mm])과 정밀 대칭을 이루도록 mt-[3mm] 설정으로 원고지에 깔끔하게 밀착
            const singleBottomLine = document.createElement('div');
            // 가로선은 페이지 전체 프레임 조판선이므로 선명함을 유지하도록 custom-grid-border 적용
            singleBottomLine.className = "w-full border-t border-solid custom-grid-border mt-[3mm] shrink-0";
            innerDiv.appendChild(singleBottomLine);
          } else {
            // 제목 밑의 가로선(marginBottom = "2mm")과 완벽하게 정밀 대칭을 이루도록 mt-[2mm] 설정으로 가로선 추가
            const singleBottomLine = document.createElement('div');
            singleBottomLine.className = "w-full border-t border-solid custom-grid-border mt-[2mm] shrink-0";
            innerDiv.appendChild(singleBottomLine);
          }

          // 꼬리말, 페이지 번호 표시 안 함 분기 처리
          if (!hidePageNumbers) {
            const footerDiv = document.createElement('div');
            footerDiv.className = "absolute bottom-[18mm] left-[20mm] right-[20mm] pt-2 flex justify-between items-center text-xs text-slate-400 font-bold shrink-0";
            
            let currentFooterLabel = "";
            let currentFooterClass = "";
            if (isLineNote) {
              if (currentMode === 'guide') {
                currentFooterLabel = footerGuideText + " - 줄 노트";
                currentFooterClass = "footer-label-guide";
              } else {
                currentFooterLabel = footerEmptyText + " - 줄 노트";
                currentFooterClass = "footer-label-empty";
              }
            } else {
              if (currentMode === 'guide') {
                currentFooterLabel = footerGuideText;
                currentFooterClass = "footer-label-guide";
              } else {
                currentFooterLabel = footerEmptyText;
                currentFooterClass = "footer-label-empty";
              }
            }

            footerDiv.innerHTML = `
              <span class="tracking-wide text-slate-400"><span class="${currentFooterClass}" contenteditable="true">${currentFooterLabel}</span></span>
              <span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full">- ${pageIdx + 1} / ${totalGridPages} -</span>
            `;
            innerDiv.appendChild(footerDiv);
          }

          gridPageDiv.appendChild(innerDiv);
          container.appendChild(gridPageDiv);
        }
      });

      updateHeaderAndTitle();
    }

    // 초기 로드 시 프리셋 동기화 및 실행
    updatePageStyleSheet();
    renderPages();
    
    // 기본 프리셋 활성화 체크 표시 (녹색 & 빨간색 설정)
    setGridColor('#69afa0');
    setGuideColor('#ff8c8c');
    
    // 기계식 CSS 변수와 슬라이더 기본 수치 0% 일관 동기화
    updateCharYOffset(0);
    document.getElementById('charYOffsetSlider').value = 0;
  </script>
</body>
</html>
