<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>별 헤는 밤</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Noto Sans JP/KR (CJK 고딕), Noto Serif JP/KR (CJK 명조) -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;700&family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --guide-display: block;
      --guide-color: rgba(255, 140, 140, 0.35); /* 기본값 R:255 G:140 B:140 투명도 0.35 적용 */
      --grid-color: rgba(105, 175, 160, 1);  /* 기본값 연한 녹색, 투명도 1 항상 고정 */
      --manuscript-grid-color: rgba(105, 175, 160, 1); /* 원고지 격자 전용 색상 (슬라이더 투명도 연동) */
      --char-y-offset: 0%; /* 기본 정중앙 오프셋을 0%로 초기화 */
    }

    /* 어떤 환경에서도 동일한 표준 명조체를 보장하는 CSS 선언 */
    .font-serif-fixed {
      font-family: 'Noto Serif JP', 'Noto Serif KR', 'Batang', 'AppleMyungjo', 'serif' !important;
      font-weight: 500 !important;
      font-style: normal !important;
    }

    /* Noto Sans CJK 일본어/한자용 폰트가 가장 우선으로 적용되도록 순서 변경 */
    body {
      font-family: 'Noto Sans JP', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background-color: #f1f5f9;
    }

    /* CSS 변수를 이용한 정밀 격자색/텍스트색 연동 클래스 */
    .custom-grid-border {
      border-color: var(--grid-color) !important;
    }
    .custom-grid-text {
      color: var(--grid-color) !important;
    }

    /* 원고지 격자 전용 테두리 클래스 (투명도 조절 슬라이더의 유일한 적용처) */
    .manuscript-grid-border {
      border-color: var(--manuscript-grid-color) !important;
    }

    /* 십자 가이드선 스타일 (연한 투명도 0.35 적용 및 동적 바인딩) */
    /* 따라쓰기 글자(z-index: 10)보다 아래에 배치되도록 z-index: 1 지정 */
    .grid-cell-guide {
      position: relative;
      box-sizing: border-box;
    }
    .grid-cell-guide::before {
      content: "";
      display: var(--guide-display) !important;
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      border-left: 1px dashed var(--guide-color) !important;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 1;
    }
    .grid-cell-guide::after {
      content: "";
      display: var(--guide-display) !important;
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      border-top: 1px dashed var(--guide-color) !important;
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 1;
    }

    /* 인라인 편집 모드 시 시각적 반응형 힌트 및 포커스 스타일링 */
    [contenteditable="true"] {
      transition: all 0.2s ease;
      border-radius: 4px;
      padding: 1px 4px;
    }
    [contenteditable="true"]:hover {
      background-color: rgba(245, 158, 11, 0.08); 
      outline: 1.5px dashed rgba(245, 158, 11, 0.5);
      cursor: text;
    }
    [contenteditable="true"]:focus {
      background-color: rgba(245, 158, 11, 0.12);
      outline: 2px solid #d97706;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
    }
    [contenteditable="true"]:empty::before {
      content: "입력";
      color: #cbd5e1;
      font-style: italic;
    }

    /* 이름 입력칸의 '입력' 가이드 문자 강제 제거 */
    .name-placeholder[contenteditable="true"]:empty::before {
      content: "" !important;
    }

    /* 상하 18mm, 좌우 20mm 대칭 격리로 완벽 고정하여 균형 확보 */
    /* 하단 패딩을 23.5mm로 고정하여 푸터 상단부와 1.5mm 정밀 간격 상시 확보 */
    .print-page-inner {
      width: 100%;
      height: 100%;
      padding: 18mm 20mm 23.5mm 20mm;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      position: relative;
    }

    /* 원문 읽기용 양면 다단 구분선 실시간 바인딩 */
    .p-inner-content {
      column-rule-color: var(--grid-color) !important;
      column-rule-style: dashed !important;
      column-rule-width: 1px !important;
    }

    /* 프리뷰 및 인쇄 시 공통 페이지 브레이크 제어 */
    .print-page {
      page-break-after: auto !important;
      break-after: auto !important;
      page-break-before: auto !important;
      break-before: auto !important;
      page-break-inside: auto !important;
      break-inside: auto !important;
    }
    .print-page:last-child, .print-page:last-of-type {
      page-break-after: auto !important;
      break-after: auto !important;
      page-break-inside: auto !important;
      break-inside: auto !important;
    }

    /* Safari/WebKit까지 안정적으로 맞추는 인쇄 레이아웃 */
    @media print {
      .no-print {
        display: none !important;
      }
      
      html, body {
        display: block !important;
        background-color: #ffffff !important;
        margin: 0 !important;
        padding: 0 !important;
        width: auto !important;
        height: auto !important;
        min-height: 0 !important;
        overflow: visible !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      #main-layout-container,
      main,
      #print-area-wrapper,
      #pages-container {
        display: block !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        height: auto !important;
        min-height: 0 !important;
        overflow: visible !important;
        box-shadow: none !important;
        background: transparent !important;
      }

      #pages-container {
        contain: none !important;
        align-items: stretch !important;
      }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .border-2 {
        border-width: 2px !important;
        border-style: solid !important;
      }
      .border-dashed {
        border-style: dashed !important;
      }
      .border-b {
        border-bottom-width: 1px !important;
        border-bottom-style: solid !important;
      }
      .border-r {
        border-right-width: 1px !important;
        border-right-style: solid !important;
      }

      /* 인쇄 시에도 긴 원문 보기 박스의 뚫린 테두리 스타일 유지 */
      .border-t-0 {
        border-top-width: 0px !important;
      }
      .border-b-0 {
        border-bottom-width: 0px !important;
      }
      .rounded-b-none {
        border-bottom-left-radius: 0px !important;
        border-bottom-right-radius: 0px !important;
      }
      .rounded-t-none {
        border-top-left-radius: 0px !important;
        border-top-right-radius: 0px !important;
      }
      .rounded-none {
        border-radius: 0px !important;
      }

      .print-page {
        box-shadow: none !important;
        margin: 0 !important;
        border: none !important;
        width: var(--print-page-width) !important;
        height: var(--print-page-height) !important;
        max-width: var(--print-page-width) !important;
        max-height: var(--print-page-height) !important;
        break-after: auto !important;
        page-break-after: auto !important;
        break-before: auto !important;
        page-break-before: auto !important;
        page-break-inside: auto !important;
        break-inside: auto !important;
        box-sizing: border-box !important;
        display: block !important; 
        position: relative !important;
        float: none !important;
        clear: both !important;
        overflow: visible !important;
        background-color: white !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .print-page + .print-page {
        break-before: page !important;
        page-break-before: always !important;
        -webkit-column-break-before: always !important;
      }

      .print-page:last-child, .print-page:last-of-type {
        break-after: auto !important;
        page-break-after: auto !important;
        -webkit-column-break-after: auto !important;
        break-inside: auto !important;
        page-break-inside: auto !important;
      }

      [contenteditable="true"]:empty::before {
        content: "" !important;
        display: none !important;
      }
    }

    /* 화면 프리뷰용 */
    .a4-page {
      background: white;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08), 0 5px 15px rgba(0, 0, 0, 0.04);
      padding: 0; 
      box-sizing: border-box;
      display: block;
      position: relative;
      margin-bottom: 2.5rem;
    }

    .portrait-page {
      width: var(--screen-page-width);
      height: var(--screen-page-height);
    }

    .landscape-page {
      width: var(--screen-page-width);
      height: var(--screen-page-height); 
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f8fafc;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <header class="bg-slate-900 text-white shadow-md no-print py-4 px-6 flex justify-between items-center z-10 shrink-0">
    <div class="flex items-center space-x-3">
      <div class="bg-emerald-600 p-2 rounded-lg">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight">필사 용지 만들기</h1>
      </div>
    </div>
  </header>

  <div id="main-layout-container" class="flex-1 flex flex-col lg:flex-row min-h-0">
    
    <!-- 왼쪽 사이드바: 설정 영역 제어 보드 -->
    <aside class="w-full lg:w-[420px] bg-white border-r border-slate-200 no-print shrink-0 lg:sticky lg:top-0 lg:h-[calc(100vh-72px)] flex flex-col">
      
      <!-- [고정] 인쇄 및 PDF 저장 버튼 패널 -->
      <div class="p-6 pb-4 border-b border-slate-200 bg-white z-20 shrink-0">
        <button onclick="window.print()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-md flex items-center justify-center space-x-2 transition-all active:scale-[0.98]">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path>
          </svg>
          <span class="text-base tracking-wide">인쇄 및 PDF로 저장</span>
        </button>
      </div>

      <!-- [스크롤 영역] 셋팅 및 구성 필드 패널 -->
      <div class="flex-1 overflow-y-auto p-6 pt-4 space-y-6">
        
        <!-- 1. 용지 방향 -->
        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">1. 용지 방향</label>
          <div class="grid grid-cols-2 gap-2">
            <button id="btn-portrait" onclick="setOrientation('portrait')" class="py-2.5 px-4 rounded-lg border-2 border-emerald-600 bg-emerald-50 text-emerald-800 font-bold text-sm transition-all flex items-center justify-center space-x-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              <span>세로 모드</span>
            </button>
            <button id="btn-landscape" onclick="setOrientation('landscape')" class="py-2.5 px-4 rounded-lg border border-slate-300 bg-white text-slate-700 font-medium text-sm transition-all flex items-center justify-center space-x-2">
              <svg class="w-4 h-4 rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              <span>가로 모드</span>
            </button>
          </div>
        </div>

        <!-- 2. 글 제목 -->
        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">2. 글 제목</label>
          <input type="text" id="input-title" value="별 헤는 밤" class="w-full p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium" placeholder="필사할 글의 제목을 적어주세요.">
        </div>

        <!-- 3. 필사할 원문 붙여넣기 -->
        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm flex justify-between items-center">
            <span>3. 필사할 원문 붙여넣기</span>
            <span id="char-counter" class="text-xs font-normal text-slate-500">0자 입력됨</span>
          </label>
          <textarea id="source-text" class="w-full h-36 p-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm leading-relaxed" placeholder="여기에 필사할 원문을 붙여 넣으세요."></textarea>
        </div>

        <!-- 4. 원고지 설정 -->
        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">4. 원고지 설정</label>
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-4">
            
            <!-- 원고지 가로 칸 수 -->
            <div>
              <span class="block text-slate-600 font-semibold text-xs mb-1.5">원고지 가로 칸 수</span>
              <select id="grid-cols-select" class="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm bg-white">
                <option value="10">10칸 (초등 저학년 / 큰 글자)</option>
                <option value="12">12칸</option>
                <option value="14">14칸</option>
                <option value="16">16칸</option>
                <option value="18">18칸</option>
                <option value="20" selected>20칸 (표준 200자형 / 500자)</option>
                <option value="22">22칸</option>
                <option value="24">24칸 (집중도 높은 필사용)</option>
                <option value="line">줄 노트 (가로줄만 표시)</option>
              </select>
            </div>

            <!-- 세부 옵션 체크박스 4종 -->
            <div class="space-y-2 pt-1 border-t border-slate-200/60">
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="hide-manuscript-header" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
                <span class="ml-2.5 text-xs text-slate-700 font-bold">원고지 페이지에 이름 등 표시 안 함</span>
              </label>
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="hide-char-count" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
                <span class="ml-2.5 text-xs text-slate-700 font-bold">원고지 오른쪽 글자 수 표시 안 함</span>
              </label>
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="hide-grid-guides" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
                <span class="ml-2.5 text-xs text-slate-700 font-bold">원고지 가운데 점선 표시 안 함</span>
              </label>
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="hide-page-numbers" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
                <span class="ml-2.5 text-xs text-slate-700 font-bold">꼬리말, 페이지 번호 표시 안 함</span>
              </label>
            </div>

            <!-- 글자 상하 위치 미세 조정 -->
            <div class="pt-3 border-t border-slate-200/60">
              <label class="block text-slate-700 font-bold mb-1 text-xs flex justify-between">
                <span>글자 상하 위치 미세 조정</span>
                <span id="charYOffsetVal" class="text-emerald-600 font-bold">0%</span>
              </label>
              <input type="range" id="charYOffsetSlider" min="-15" max="15" step="0.5" value="0" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-600" oninput="updateCharYOffset(this.value)">
              <p class="text-[10px] text-slate-400 mt-1">시스템 환경에 따라 원고지 안의 글자 높이가 맞지 않을 때 슬라이더로 올리거나 내리세요.</p>
            </div>

            <!-- 원고지 및 점선 색상 팔레트 -->
            <div class="pt-3 border-t border-slate-200/60 space-y-3">
              <div>
                <span class="block text-slate-600 font-semibold text-xs mb-1.5">원고지 색</span>
                <div class="flex flex-wrap gap-2 items-center">
                  <button onclick="setGridColor('#000000')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" title="검은색" style="background-color: #000000;">
                    <span class="grid-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>
                  </button>
                  <button onclick="setGridColor('#69afa0')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" title="녹색" style="background-color: #69afa0;">
                    <span class="grid-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>
                  </button>
                  <button onclick="setGridColor('#ff8c8c')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" title="빨간색" style="background-color: #ff8c8c;">
                    <span class="grid-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>
                  </button>
                  <button onclick="setGridColor('#2563eb')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" title="파란색" style="background-color: #2563eb;">
                    <span class="grid-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>
                  </button>
                  <button onclick="setGridColor('#991b1b')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" title="진한 빨간색" style="background-color: #991b1b;">
                    <span class="grid-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>
                  </button>
                  <div class="relative flex items-center">
                    <button onclick="document.getElementById('grid-color-picker').click()" class="py-1 px-2.5 rounded-lg border border-slate-300 bg-white hover:bg-slate-50 text-[11px] font-bold text-slate-700 flex items-center space-x-1 shadow-sm active:scale-95 transition-all" title="다른 색 선택">
                      <span class="w-3 h-3 rounded-full border border-slate-400 bg-gradient-to-tr from-indigo-500 via-purple-500 to-pink-500"></span>
                      <span>다른 색</span>
                    </button>
                    <input type="color" id="grid-color-picker" value="#69afa0" class="sr-only" oninput="setGridColor(this.value, true)">
                  </div>
                </div>
                <!-- 원고지 선 투명도 슬라이더 추가 -->
                <div class="mt-2.5">
                  <div class="flex justify-between items-center text-[10px] text-slate-500 font-semibold mb-1">
                    <span>원고지 선 투명도</span>
                    <span id="gridOpacityVal" class="text-emerald-600 font-bold">100%</span>
                  </div>
                  <input type="range" id="gridOpacitySlider" min="0" max="100" step="5" value="100" class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-600" oninput="updateGridOpacity(this.value)">
                </div>
              </div>

              <div>
                <span class="block text-slate-500 font-semibold text-[11px] mb-1.5">원고지 가운데 점선 색</span>
                <div class="flex flex-wrap gap-2 items-center">
                  <button onclick="setGuideColor('#000000')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" title="검은색" style="background-color: #000000;">
                    <span class="guide-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>
                  </button>
                  <button onclick="setGuideColor('#69afa0')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" title="녹색" style="background-color: #69afa0;">
                    <span class="guide-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>
                  </button>
                  <button onclick="setGuideColor('#ff8c8c')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" title="빨간색" style="background-color: #ff8c8c;">
                    <span class="guide-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>
                  </button>
                  <button onclick="setGuideColor('#2563eb')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" title="파란색" style="background-color: #2563eb;">
                    <span class="guide-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>
                  </button>
                  <button onclick="setGuideColor('#991b1b')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" title="진한 빨간색" style="background-color: #991b1b;">
                    <span class="guide-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>
                  </button>
                  <div class="relative flex items-center">
                    <button onclick="document.getElementById('guide-color-picker').click()" class="py-1 px-2.5 rounded-lg border border-slate-300 bg-white hover:bg-slate-50 text-[11px] font-bold text-slate-700 flex items-center space-x-1 shadow-sm active:scale-95 transition-all" title="다른 색 선택">
                      <span class="w-3 h-3 rounded-full border border-slate-400 bg-gradient-to-tr from-indigo-500 via-purple-500 to-pink-500"></span>
                      <span>다른 색</span>
                    </button>
                    <input type="color" id="guide-color-picker" value="#ff8c8c" class="sr-only" oninput="setGuideColor(this.value, true)">
                  </div>
                </div>
                <!-- 원고지 가운데 점선 투명도 슬라이더 추가 -->
                <div class="mt-2.5">
                  <div class="flex justify-between items-center text-[10px] text-slate-500 font-semibold mb-1">
                    <span>가운데 점선 투명도</span>
                    <span id="guideOpacityVal" class="text-emerald-600 font-bold">35%</span>
                  </div>
                  <input type="range" id="guideOpacitySlider" min="0" max="100" step="5" value="35" class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-600" oninput="updateGuideOpacity(this.value)">
                </div>
              </div>
            </div>

          </div>
        </div>

        <!-- 5. 학생 정보 -->
        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">5. 학생 정보</label>
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
            <div class="grid grid-cols-2 gap-3 text-xs text-slate-600">
              <div>
                <span class="block mb-1 font-medium text-slate-500">학교 이름</span>
                <input type="text" id="input-school" value="건국초등학교" class="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" placeholder="학교 이름 입력">
              </div>
              <div>
                <span class="block mb-1 font-medium text-slate-500">학년 / 반</span>
                <input type="text" id="input-grade" value="" class="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" placeholder="학년 / 반 입력">
              </div>
              <div class="col-span-2">
                <span class="block mb-1 font-semibold text-emerald-800">학생 이름</span>
                <input type="text" id="input-name" value="" class="w-full p-2.5 border-2 border-emerald-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600 text-sm font-bold bg-emerald-50/35" placeholder="학생 이름 입력">
              </div>
            </div>
          </div>
        </div>

        <!-- 6. 출력 설정 -->
        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">6. 출력 설정</label>
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
            <label class="flex items-center cursor-pointer">
              <input type="checkbox" id="exclude-first-page" checked class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
              <span class="ml-2.5 text-xs text-slate-700 font-bold">원문 보기 표시</span>
            </label>
            <label class="flex items-center cursor-pointer">
              <input type="checkbox" id="pattern-guide" checked class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
              <span class="ml-2.5 text-xs text-slate-700 font-bold">따라쓰기 글씨 포함</span>
            </label>
            <label class="flex items-center cursor-pointer">
              <input type="checkbox" id="pattern-empty" checked class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
              <span class="ml-2.5 text-xs text-slate-700 font-bold">빈 원고지</span>
            </label>
          </div>
        </div>

      </div>
    </aside>

    <main class="flex-1 bg-slate-100 overflow-y-auto p-4 md:p-8 flex flex-col items-center">
      <div id="print-area-wrapper" class="w-full flex flex-col items-center">
        <!-- 동적으로 페이지들이 얹어질 프리뷰 컨테이너 -->
        <div id="pages-container" class="flex flex-col items-center"></div>
      </div>
    </main>

  </div>

  <script>
    let sourceText = "계절이 지나가는 하늘에는\n가을로 가득 차 있습니다.\n\n나는 아무 걱정도 없이\n가을 속의 별들을 다 헤일 듯합니다.\n\n가슴 속에 하나 둘 새겨지는 별을\n이제 다 못 헤는 것은\n쉬이 아침이 오는 까닭이요,\n내일 밤이 남은 까닭이요,\n아직 나의 청춘이 다하지 않은 까닭입니다.\n\n별 하나에 추억과\n별 하나에 사랑과\n별 하나에 쓸쓸함과\n별 하나에 동경과\n별 하나에 시와\n별 하나에 어머니, 어머니";
    let articleTitle = "별 헤는 밤";
    let gridCols = "20"; 
    let schoolName = "건국초등학교";
    let gradeInfo = "";
    let studentName = "";
    let excludeFirstPage = false; 
    let hideManuscriptHeader = false; 
    let hideCharCount = false;
    let hidePageNumbers = false; // 글로벌 변수 누락 해결을 위한 정의 추가
    let orientation = "portrait";

    let headerLeftText = "";
    
    let footerSourceText = "원문 읽기";
    let footerGuideText = "따라 쓰기";
    let footerEmptyText = "원고지";

    // 실시간 색상 및 불투명도 제어기 전역 상태 변수 선언
    let currentGridColor = '#69afa0';
    let currentGuideColor = '#ff8c8c';
    let gridOpacity = 1.0;
    let guideOpacity = 0.35;

    // 초기값 할당
    document.getElementById('source-text').value = sourceText;
    document.getElementById('char-counter').textContent = `${sourceText.length}자 입력됨`;
    document.title = articleTitle ? articleTitle : "필사 용지 만들기";

    document.getElementById('source-text').addEventListener('input', (e) => {
      sourceText = e.target.value;
      document.getElementById('char-counter').textContent = `${sourceText.length}자 입력됨`;
      renderPages();
    });

    document.getElementById('input-title').addEventListener('input', (e) => {
      articleTitle = e.target.value;
      document.title = articleTitle ? articleTitle : "필사 용지 만들기";
      renderPages();
    });

    document.getElementById('grid-cols-select').addEventListener('change', (e) => {
      gridCols = e.target.value;
      renderPages();
    });

    const inputIds = ['input-school', 'input-grade', 'input-name'];
    inputIds.forEach(id => {
      document.getElementById(id).addEventListener('input', (e) => {
        const val = e.target.value;
        if (id === 'input-school') schoolName = val;
        if (id === 'input-grade') gradeInfo = val;
        if (id === 'input-name') studentName = val;
        updateHeaderAndTitle();
      });
    });

    document.getElementById('pattern-guide').addEventListener('change', renderPages);
    document.getElementById('pattern-empty').addEventListener('change', renderPages);
    document.getElementById('exclude-first-page').addEventListener('change', (e) => {
      excludeFirstPage = !e.target.checked;
      renderPages();
    });
    document.getElementById('hide-manuscript-header').addEventListener('change', (e) => {
      hideManuscriptHeader = e.target.checked;
      renderPages();
    });
    document.getElementById('hide-char-count').addEventListener('change', (e) => {
      hideCharCount = e.target.checked;
      renderPages();
    });
    document.getElementById('hide-page-numbers').addEventListener('change', (e) => {
      hidePageNumbers = e.target.checked;
      renderPages();
    });

    document.getElementById('hide-grid-guides').addEventListener('change', updateGridGuides);

    function hexToRgba(hex, alpha = 0.35) {
      hex = hex.replace('#', '');
      let r = parseInt(hex.substring(0, 2), 16);
      let g = parseInt(hex.substring(2, 4), 16);
      let b = parseInt(hex.substring(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function setGridColor(val, isCustom = false) {
      currentGridColor = val;
      // 일반 UI용 grid-color는 투명도 적용 없이 언제나 100% 선명하게 유지
      document.documentElement.style.setProperty('--grid-color', val);
      // 오직 원고지 격자 전용에만 슬라이더의 투명도 값을 혼합하여 셋팅
      document.documentElement.style.setProperty('--manuscript-grid-color', hexToRgba(val, gridOpacity));
      
      const buttons = document.querySelectorAll('.grid-color-check');
      buttons.forEach(el => el.classList.add('hidden'));
      
      if (!isCustom) {
        const matchedBtn = document.querySelector(`button[onclick="setGridColor('${val}')"] .grid-color-check`);
        if (matchedBtn) matchedBtn.classList.remove('hidden');
        document.getElementById('grid-color-picker').value = val;
      }
    }

    function setGuideColor(val, isCustom = false) {
      currentGuideColor = val;
      updateGridGuides();

      const checks = document.querySelectorAll('.guide-color-check');
      checks.forEach(el => el.classList.add('hidden'));

      if (!isCustom) {
        const matchedBtn = document.querySelector(`button[onclick="setGuideColor('${val}')"] .guide-color-check`);
        if (matchedBtn) matchedBtn.classList.remove('hidden');
        document.getElementById('guide-color-picker').value = val;
      }
    }

    function updateGridGuides() {
      const hideGuides = document.getElementById('hide-grid-guides').checked;
      document.documentElement.style.setProperty('--guide-display', hideGuides ? 'none' : 'block');
      document.documentElement.style.setProperty('--guide-color', hexToRgba(currentGuideColor, guideOpacity));
    }

    // 원고지 선 전역 투명도 실시간 제어 (다른 헤더나 이름 란에는 영향 미침 방지)
    function updateGridOpacity(val) {
      gridOpacity = val / 100;
      document.getElementById('gridOpacityVal').innerText = val + '%';
      document.documentElement.style.setProperty('--manuscript-grid-color', hexToRgba(currentGridColor, gridOpacity));
    }

    function updateGuideOpacity(val) {
      guideOpacity = val / 100;
      document.getElementById('guideOpacityVal').innerText = val + '%';
      updateGridGuides();
    }

    function updateCharYOffset(val) {
      const displayVal = (val > 0 ? '+' : '') + val + '%';
      document.getElementById('charYOffsetVal').innerText = displayVal;
      document.documentElement.style.setProperty('--char-y-offset', val + '%');
    }

    function setOrientation(mode) {
      orientation = mode;
      
      const btnPortrait = document.getElementById('btn-portrait');
      const btnLandscape = document.getElementById('btn-landscape');

      if (orientation === 'portrait') {
        btnPortrait.className = "py-2.5 px-4 rounded-lg border-2 border-emerald-600 bg-emerald-50 text-emerald-800 font-bold text-sm transition-all flex items-center justify-center space-x-2";
        btnLandscape.className = "py-2.5 px-4 rounded-lg border border-slate-300 bg-white text-slate-700 font-medium text-sm transition-all flex items-center justify-center space-x-2";
      } else {
        btnPortrait.className = "py-2.5 px-4 rounded-lg border border-slate-300 bg-white text-slate-700 font-medium text-sm transition-all flex items-center justify-center space-x-2";
        btnLandscape.className = "py-2.5 px-4 rounded-lg border-2 border-emerald-600 bg-emerald-50 text-emerald-800 font-bold text-sm transition-all flex items-center justify-center space-x-2";
      }

      updatePageStyleSheet();
      renderPages();
    }

    function updatePageStyleSheet() {
      let styleEl = document.getElementById('dynamic-page-style');
      if (!styleEl) {
        styleEl = document.createElement('style');
        styleEl.id = 'dynamic-page-style';
        document.head.appendChild(styleEl);
      }
      if (orientation === 'portrait') {
        styleEl.innerHTML = `
          @page { size: A4 portrait !important; margin: 0 !important; }
          :root {
            --screen-page-width: 210mm;
            --screen-page-height: 297mm;
            --print-page-width: 210mm;
            --print-page-height: 296mm;
          }
          .print-page { 
            width: var(--screen-page-width) !important; 
            height: var(--screen-page-height) !important; 
            max-width: var(--screen-page-width) !important; 
            max-height: var(--screen-page-height) !important; 
            margin: 0 auto 2.5rem auto !important;
          }
          @media print {
            .print-page {
              width: var(--print-page-width) !important;
              height: var(--print-page-height) !important;
              max-width: var(--print-page-width) !important;
              max-height: var(--print-page-height) !important;
              margin: 0 !important;
            }
          }
        `;
      } else {
        styleEl.innerHTML = `
          @page { size: A4 landscape !important; margin: 0 !important; }
          :root {
            --screen-page-width: 297mm;
            --screen-page-height: 210mm;
            --print-page-width: 297mm;
            --print-page-height: 209mm;
          }
          .print-page { 
            width: var(--screen-page-width) !important; 
            height: var(--screen-page-height) !important; 
            max-width: var(--screen-page-width) !important; 
            max-height: var(--screen-page-height) !important; 
            margin: 0 auto 2.5rem auto !important;
          }
          @media print {
            .print-page {
              width: var(--print-page-width) !important;
              height: var(--print-page-height) !important;
              max-width: var(--print-page-width) !important;
              max-height: var(--print-page-height) !important;
              margin: 0 !important;
            }
          }
        `;
      }
    }

    function getBlankPlaceholders() {
      return {
        school: (schoolName === " " || schoolName.trim()) ? schoolName : "",
        grade: (gradeInfo === " " || gradeInfo.trim()) ? gradeInfo : "__________학년 __________반",
        name: "" 
      };
    }

    function updateHeaderAndTitle() {
      const placeholders = getBlankPlaceholders();
      
      document.querySelectorAll('.school-placeholder').forEach(el => el.textContent = placeholders.school);
      document.querySelectorAll('.grade-placeholder').forEach(el => el.textContent = placeholders.grade);
      
      document.querySelectorAll('.name-placeholder-container').forEach(el => {
        if (studentName.trim()) {
          el.innerHTML = `<span class="name-placeholder text-slate-900 text-base font-extrabold flex-1 text-center tracking-[1em] pl-[1em]" contenteditable="true">${studentName}</span>`;
        } else {
          el.innerHTML = `<span class="name-placeholder text-slate-400 text-base font-medium flex-1 text-center tracking-normal" contenteditable="true"></span>`;
        }
      });
      
      document.querySelectorAll('.title-placeholder').forEach(el => {
        el.textContent = articleTitle ? articleTitle : '';
      });
    }

    function syncMetadata(className, value, activeElement) {
      document.querySelectorAll('.' + className).forEach(el => {
        if (el !== activeElement) {
          el.textContent = value;
        }
      });
    }

    document.addEventListener('input', (e) => {
      const target = e.target;
      if (!target.hasAttribute('contenteditable')) return;

      if (target.innerHTML === '<br>') {
        target.innerHTML = '';
      }

      const txt = target.textContent;

      if (target.classList.contains('school-placeholder')) {
        schoolName = txt === "" ? " " : txt;
        document.getElementById('input-school').value = schoolName === " " ? "" : schoolName;
        syncMetadata('school-placeholder', schoolName, target);
      }
      else if (target.classList.contains('grade-placeholder')) {
        gradeInfo = txt === "" ? " " : txt;
        document.getElementById('input-grade').value = gradeInfo === " " ? "" : gradeInfo;
        syncMetadata('grade-placeholder', gradeInfo, target);
      }
      else if (target.classList.contains('name-placeholder')) {
        studentName = txt;
        document.getElementById('input-name').value = studentName;
        syncMetadata('name-placeholder', studentName, target);
      }
      else if (target.classList.contains('title-placeholder')) {
        articleTitle = txt;
        document.getElementById('input-title').value = articleTitle;
        syncMetadata('title-placeholder', articleTitle, target);
        document.title = articleTitle ? articleTitle : "필사 용지 만들기";
        syncMetadata('mini-header-center', articleTitle, null);
      }
      else if (target.classList.contains('mini-header-left')) {
        headerLeftText = txt;
        syncMetadata('mini-header-left', headerLeftText, target);
      }
      else if (target.classList.contains('mini-header-center')) {
        articleTitle = txt;
        document.getElementById('input-title').value = articleTitle;
        syncMetadata('mini-header-center', articleTitle, target);
        syncMetadata('title-placeholder', articleTitle, null);
        document.title = articleTitle ? articleTitle : "필사 용지 만들기";
      }
      else if (target.classList.contains('footer-label-source')) {
        footerSourceText = txt;
        syncMetadata('footer-label-source', footerSourceText, target);
      }
      else if (target.classList.contains('footer-label-guide')) {
        footerGuideText = txt;
        syncMetadata('footer-label-guide', footerGuideText, target);
      }
      else if (target.classList.contains('footer-label-empty')) {
        footerEmptyText = txt;
        syncMetadata('footer-label-empty', footerEmptyText, target);
      }
    });

    document.addEventListener('paste', (e) => {
      const target = e.target;
      const isTargetEditable = target.hasAttribute('contenteditable') || target.id === 'source-text';
      if (!isTargetEditable) return;

      e.preventDefault();
      let text = (e.clipboardData || window.clipboardData).getData('text/plain');
      text = text.replace(/\r\n/g, '\n');
      
      if (target.id === 'source-text') {
        text = text.replace(/\n{3,}/g, '\n\n');
        const start = target.selectionStart;
        const end = target.selectionEnd;
        const currentVal = target.value;
        target.value = currentVal.substring(0, start) + text + currentVal.substring(end);
        target.selectionStart = target.selectionEnd = start + text.length;
        target.dispatchEvent(new Event('input', { bubbles: true }));
      } else {
        text = text.replace(/\n/g, ' ');
        document.execCommand('insertText', false, text);
        target.dispatchEvent(new Event('input', { bubbles: true }));
      }
    });

    document.addEventListener('blur', (e) => {
      const target = e.target;
      if (!target.hasAttribute('contenteditable')) return;

      if (target.textContent.trim() === "") {
        target.innerHTML = "";
      }

      if (
        target.classList.contains('title-placeholder') ||
        target.classList.contains('mini-header-center')
      ) {
        renderPages();
      }
    }, true);


    // 구두점/기호 연속 2개까지 한 칸 배치 보존 + 단 문자가 섞일 때는 한 개 제한 연산 엔진
    function parseTextToManuscriptCells(text, cols) {
      const cells = [];
      const isAlphanumeric = (c) => /[0-9a-zA-Z]/.test(c);
      const isPunctuation = (c) => /[.,!?'"危害“”‘’()\[\]{}<>~?;:：；]/.test(c);
      
      const isPeriodOrComma = (c) => c === '.' || c === ',';
      const isQuote = (c) => /[“‘”’"']/.test(c);
      const isSymbol = (c) => /[!?！？]/.test(c); 

      const paragraphs = text.split('\n');

      paragraphs.forEach((pText, pIdx) => {
        if (pText.trim() === "" && pIdx > 0) {
          const colIndex = cells.length % cols;
          if (colIndex > 0) {
            const fillCount = cols - colIndex;
            for (let f = 0; f < fillCount; f++) {
              cells.push({ char: "", isSpace: true, isParagraphFiller: true });
            }
          }
          for (let f = 0; f < cols; f++) {
            cells.push({ char: "", isSpace: true, isParagraphFiller: true });
          }
          return;
        }

        if (pIdx > 0) {
          const colIndex = cells.length % cols;
          if (colIndex > 0) {
            const fillCount = cols - colIndex;
            for (let f = 0; f < fillCount; f++) {
              cells.push({ char: "", isSpace: true, isParagraphFiller: true });
            }
          }
        }

        cells.push({ char: " ", isSpace: true, isParagraphStartSpace: true });

        let charIdx = 0;
        while (charIdx < pText.length) {
          let char = pText[charIdx];
          let nextChar = pText[charIdx + 1];
          let colIndex = cells.length % cols;

          // 행말(마지막 칸) 구두점 압착 시 예외 적용 (문자 1개 + 구두점/기호 단 1개만 매핑)
          const isAtRowEnd = (colIndex === 0 && cells.length > 0);

          if (isPunctuation(char) && isAtRowEnd) {
            let targetIdx = cells.length - 1;
            if (cells[targetIdx] && !cells[targetIdx].isParagraphFiller && !cells[targetIdx].squeezedPunct) {
              cells[targetIdx].squeezedPunct = char; // 문자가 섞일 때는 단 한 개만 압착 허용
              cells[targetIdx].isSqueezed = true;
              charIdx += 1;
              continue;
            }
          }

          // 1. 마침표/쉼표 + 여는 따옴표 연속 조합 우선 패키징 처리
          if (isPeriodOrComma(char) && nextChar && (nextChar === '“' || nextChar === '‘')) {
            cells.push({
              char: char,
              squeezedPunct: nextChar,
              isPeriodOpeningQuoteCombo: true
            });
            charIdx += 2;
            continue;
          }

          // 2. 마침표/쉼표 + 닫는 따옴표 연속 조합 우선 패키징 처리
          if (isPeriodOrComma(char) && nextChar && (nextChar === '”' || nextChar === '’' || nextChar === '"' || nextChar === "'")) {
            cells.push({
              char: char,
              squeezedPunct: nextChar,
              isPeriodQuoteCombo: true
            });
            charIdx += 2;
            continue;
          }

          // 3. 기호(물음표, 느낌표) + 따옴표 이어질 때 한 칸 표시
          if (isSymbol(char) && nextChar && isQuote(nextChar)) {
            cells.push({
              char: char,
              squeezedPunct: nextChar,
              isSymbolFirstCombo: true
            });
            charIdx += 2;
            continue;
          }

          // 4. 따옴표 + 기호 이어질 때 한 칸 표시
          if (isQuote(char) && nextChar && isSymbol(nextChar)) {
            cells.push({
              char: char,
              squeezedPunct: nextChar,
              isQuoteFirstCombo: true
            });
            charIdx += 2;
            continue;
          }

          // 5. 일반 연속 기호/구두점 처리 (구두점, 기호가 연속 될 때 한 칸에 두 개까지 허용)
          if (isPunctuation(char) && nextChar && isPunctuation(nextChar)) {
            cells.push({
              char: char,
              squeezedPunct: nextChar,
              isDoublePunct: true
            });
            charIdx += 2;
            continue;
          }

          if (char === ' ') {
            if (colIndex === 0) {
              charIdx++;
              continue;
            }
            if (cells.length > 0) {
              const prevCell = cells[cells.length - 1];
              if (prevCell && (prevCell.char === '.' || prevCell.char === ',')) {
                // 마침표 + 닫는 따옴표가 있을 때는 다음 띄어쓰기를 무시하지 않음
                if (prevCell.isPeriodQuoteCombo) {
                  cells.push({ char: " ", isSpace: true });
                  charIdx++;
                  continue;
                }
                charIdx++;
                continue;
              }
            }
            cells.push({ char: " ", isSpace: true });
            charIdx++;
            continue;
          }

          if (isAlphanumeric(char)) {
            let nextChar = pText[charIdx + 1];
            if (nextChar && isAlphanumeric(nextChar)) {
              cells.push({ char: char + nextChar, isAlphanumeric: true });
              charIdx += 2;
            } else {
              cells.push({ char: char, isAlphanumeric: true });
              charIdx += 1;
            }
            continue;
          }

          cells.push({ char: char });
          charIdx++;
        }

        const endColIndex = cells.length % cols;
        if (endColIndex > 0) {
          const fillCount = cols - endColIndex;
          for (let f = 0; f < fillCount; f++) {
            cells.push({ char: "", isSpace: true, isParagraphFiller: true });
          }
        }
      });

      return cells;
    }


    function calculateOptimalRows(cols) {
      if (cols === "line") {
        if (orientation === 'portrait') {
          return hideManuscriptHeader ? 24 : 21; 
        } else {
          return hideManuscriptHeader ? 16 : 13; 
        }
      }
      const colsNum = parseInt(cols);
      
      // 세로모드 20칸 선택 시 정확히 25줄(500칸)을 렌더링하도록 강제 설정
      if (colsNum === 20 && orientation === 'portrait') {
        return 25;
      }
      
      const usableWidthMm = (orientation === 'portrait') ? 170 : 257;
      const cellWidthMm = usableWidthMm / colsNum;
      
      const usableHeightMm = (orientation === 'portrait')
        ? (hideManuscriptHeader ? 228 : 208)
        : (hideManuscriptHeader ? 158 : 133);

      return Math.floor(usableHeightMm / cellWidthMm);
    }

    function estimateLinesForSegments(segments, fontSizePt) {
      const charWidthMm = fontSizePt * 0.3527; 
      const maxLineWidthMm = (orientation === 'portrait') ? 155 : 112; 

      let totalLines = 0;

      function getCharWidthMm(char) {
        if (/[0-9a-zA-Z]/.test(char)) return charWidthMm * 0.58; 
        if (char === ' ') return charWidthMm * 0.35; 
        if (/[.,!?'"ным“('_~);:]/.test(char)) return charWidthMm * 0.5; 
        return charWidthMm; 
      }

      const paragraphsToCalculate = [];
      let currentParaWords = [];
      let currentParaHasIndent = false;

      for (let i = 0; i < segments.length; i++) {
        const seg = segments[i];

        if (seg.isBlankLine) {
          if (currentParaWords.length > 0) {
            paragraphsToCalculate.push({
              words: currentParaWords,
              hasIndent: currentParaHasIndent
            });
            currentParaWords = [];
          }
          paragraphsToCalculate.push({ isBlankLine: true });
        } else {
          const prevSeg = i > 0 ? segments[i - 1] : null;
          const isNewParagraph = !prevSeg || prevSeg.isBlankLine || (prevSeg.pIdx !== seg.pIdx);

          if (isNewParagraph) {
            if (currentParaWords.length > 0) {
              paragraphsToCalculate.push({
                words: currentParaWords,
                hasIndent: currentParaHasIndent
              });
              currentParaWords = [];
            }
            currentParaHasIndent = !seg.isContinued;
          }

          const wordsInSeg = seg.text.split(' ');
          wordsInSeg.forEach((w, wIdx) => {
            if (w !== "") {
              currentParaWords.push(w);
            } else if (wIdx > 0 && wIdx < wordsInSeg.length - 1) {
              currentParaWords.push(""); 
            }
          });
        }
      }

      if (currentParaWords.length > 0) {
        paragraphsToCalculate.push({
          words: currentParaWords,
          hasIndent: currentParaHasIndent
        });
      }

      paragraphsToCalculate.forEach(p => {
        if (p.isBlankLine) {
          totalLines += 1.0;
          return;
        }

        const indentWidth = p.hasIndent ? (charWidthMm * 1.5) : 0;
        let currentLineWidth = indentWidth;
        let linesInPara = 1;

        p.words.forEach(word => {
          if (word === "") {
            currentLineWidth += getCharWidthMm(' ');
            return;
          }

          let wordWidth = 0;
          for (let char of word) {
            wordWidth += getCharWidthMm(char);
          }

          const spaceWidth = (currentLineWidth > indentWidth) ? getCharWidthMm(' ') : 0;

          if (currentLineWidth + spaceWidth + wordWidth > maxLineWidthMm) {
            linesInPara += 1;
            currentLineWidth = wordWidth;
          } else {
            currentLineWidth += spaceWidth + wordWidth;
          }
        });

        totalLines += linesInPara;
      });

      return totalLines;
    }

    function getMaxLines(fontSizePt, pageIdx) {
      if (orientation === 'portrait') {
        const baseLines = (pageIdx === 0) ? 19 : 22;
        return Math.floor(baseLines * (12 / fontSizePt));
      } else { 
        const baseLinesPerCol = (pageIdx === 0) ? 11 : 14;
        const linesPerCol = Math.floor(baseLinesPerCol * (12 / fontSizePt));
        return linesPerCol * 2; 
      }
    }

    function canFitSinglePage(paragraphs, fontSizePt) {
      const segments = [];
      paragraphs.forEach((p, pIdx) => {
        if (p.trim() === "") {
          segments.push({ isBlankLine: true, pIdx: pIdx });
        } else {
          segments.push({ text: p.trim(), isContinued: false, pIdx: pIdx });
        }
      });
      const lines = estimateLinesForSegments(segments, fontSizePt);
      const maxLines = getMaxLines(fontSizePt, 0); 
      return lines <= maxLines;
    }


    function paginateSourceText(paragraphs) {
      let globalFontSize = '12pt';
      
      if (canFitSinglePage(paragraphs, 12)) {
        globalFontSize = '12pt';
      } else if (canFitSinglePage(paragraphs, 11)) {
        globalFontSize = '11pt';
      } else if (canFitSinglePage(paragraphs, 10)) {
        globalFontSize = '10pt';
      } else {
        globalFontSize = '12pt'; 
      }

      const fontSizeNum = parseInt(globalFontSize);

      const stream = [];
      paragraphs.forEach((p, pIdx) => {
        const trimmed = p.trim();
        if (trimmed === "") {
          stream.push({ type: 'blank', pIdx: pIdx });
        } else {
          const sentences = trimmed.split(/(?<=[.?!])\s+/);
          sentences.forEach((s, idx) => {
            if (s.trim() !== "") {
              stream.push({
                type: 'sentence',
                text: s.trim(),
                isParaStart: (idx === 0),
                pIdx: pIdx
              });
            }
          });
        }
      });

      const pages = [];
      let currentPageIdx = 0;
      let currentPageSegments = [];

      for (let i = 0; i < stream.length; i++) {
        const item = stream[i];
        let candidateSegments = [...currentPageSegments];
        let nextSegment;

        if (item.type === 'blank') {
          nextSegment = { isBlankLine: true, pIdx: item.pIdx };
        } else {
          const isContinued = !item.isParaStart;
          nextSegment = { text: item.text, isContinued: isContinued, pIdx: item.pIdx };
        }

        candidateSegments.push(nextSegment);

        const maxLines = getMaxLines(fontSizeNum, currentPageIdx);
        const estimated = estimateLinesForSegments(candidateSegments, fontSizeNum);

        if (estimated <= maxLines) {
          currentPageSegments.push(nextSegment);
        } else {
          if (currentPageSegments.length > 0) {
            pages.push({ segments: [...currentPageSegments], fontSize: globalFontSize });
            currentPageSegments = [];
            currentPageIdx++;

            if (item.type === 'sentence') {
              const isContinuedOnNewPage = !item.isParaStart;
              currentPageSegments.push({ text: item.text, isContinued: isContinuedOnNewPage, pIdx: item.pIdx });
            } else {
              currentPageSegments.push({ isBlankLine: true, pIdx: item.pIdx });
            }
          } else {
            currentPageSegments.push(nextSegment);
          }
        }
      }
      
      if (currentPageSegments.length > 0) {
        pages.push({ segments: currentPageSegments, fontSize: globalFontSize });
      }

      return pages;
    }

    function splitTextForLineNote(text, maxNonSpace) {
      const lines = [];
      const paragraphs = text.split('\n');
      const isPunctuation = (c) => /[.,!?'"nym‘’()(\\][\]{}<>~?;:：；]/.test(c);

      paragraphs.forEach((p) => {
        if (p.trim() === "") {
          lines.push({ text: "", isFirstLine: false, isLastLineOfPara: true });
          return;
        }

        let chars = Array.from(p);
        let currentLineText = "";
        let currentNonSpaceCount = 0;
        let isFirstLine = true;

        let i = 0;
        while (i < chars.length) {
          let char = chars[i];
          let isSpace = (char === ' ' || char === '\t' || char === '\r');

          if (!isSpace && currentNonSpaceCount >= maxNonSpace) {
            if (isPunctuation(char)) {
              while (i < chars.length && isPunctuation(chars[i])) {
                currentLineText += chars[i];
                i++;
              }
            }
            
            lines.push({ text: currentLineText, isFirstLine: isFirstLine, isLastLineOfPara: false });
            currentLineText = "";
            currentNonSpaceCount = 0;
            isFirstLine = false;
            
            if (i < chars.length && chars[i] === ' ') {
              i++;
            }
            continue;
          }

          currentLineText += char;
          if (!isSpace) {
            currentNonSpaceCount++;
          }
          i++;
        }

        if (currentLineText.length > 0 || isFirstLine) {
          lines.push({ text: currentLineText, isFirstLine: isFirstLine, isLastLineOfPara: true });
        }
      });

      return lines;
    }

    function renderPages() {
      const container = document.getElementById('pages-container');
      container.innerHTML = ""; 

      const isLineNote = (gridCols === 'line');
      const optRows = calculateOptimalRows(gridCols);
      const cellsPerPage = isLineNote ? optRows : (parseInt(gridCols) * optRows);

      const placeholders = getBlankPlaceholders();

      const pageClass = orientation === 'portrait' ? 'a4-page print-page portrait-page' : 'a4-page print-page landscape-page';

      const headerHTML = `
        <div class="flex items-center justify-between w-full text-slate-800 text-sm font-bold">

            <span class="grade-placeholder whitespace-nowrap" contenteditable="true">${placeholders.grade}</span>

          <div class="flex items-center border-2 custom-grid-border rounded-lg px-4 py-1.5 bg-slate-50/50 w-[240px]">
