<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>별 헤는 밤</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Noto Sans/Serif JP & KR -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;700&family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* 동적 변수 설정 - 자간 점선 표시 가이드 및 투명도 제어 */
      --guide-display: block;
      --guide-color: rgba(255, 140, 140, 0.35); 
      --grid-color: rgba(105, 175, 160, 1);  
      --manuscript-grid-color: rgba(105, 175, 160, 1); 
      --char-y-offset: 0%; 
    }

    /* 필사 전용 고정폭 명조 계열 서체 선언 */
    .font-serif-fixed {
      font-family: 'Noto Serif KR', 'Noto Serif JP', 'Batang', 'AppleMyungjo', 'serif' !important;
      font-weight: 500 !important;
      font-style: normal !important;
    }

    body {
      font-family: 'Noto Sans KR', 'Noto Sans JP', 'Malgun Gothic', sans-serif;
      background-color: #f1f5f9;
    }

    .custom-grid-border { border-color: var(--grid-color) !important; }
    .custom-grid-text { color: var(--grid-color) !important; }
    .manuscript-grid-border { border-color: var(--manuscript-grid-color) !important; }

    /* 원고지 칸 가이드 십자 점선 생성 규칙 */
    .grid-cell-guide {
      position: relative;
      box-sizing: border-box;
    }
    .grid-cell-guide::before {
      content: "";
      display: var(--guide-display) !important;
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      border-left: 1px dashed var(--guide-color) !important;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 1;
    }
    .grid-cell-guide::after {
      content: "";
      display: var(--guide-display) !important;
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      border-top: 1px dashed var(--guide-color) !important;
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 1;
    }

    /* GPU 가속을 이용한 글자 상하 미세정렬 규칙 일괄 적용 */
    .grid-cell-guide svg g, 
    .line-note-text-span {
      transform: translate3d(0, var(--char-y-offset, 0%), 0) !important;
      transform-origin: center !important;
      will-change: transform;
    }

    /* 따라 쓰기 연한 글씨 투명도 고정 수치 반영 */
    .trace-text-node {
      opacity: 0.35 !important;
    }

    /* 실시간 인쇄 지면 편집 영역 인디케이터 및 영역 유지 장치 */
    [contenteditable="true"] {
      transition: all 0.2s ease;
      border-radius: 4px;
      padding: 1px 4px;
      -webkit-user-select: text !important;
      user-select: text !important;
      min-width: 1.5em;
      display: inline-block;
      vertical-align: middle;
    }
    [contenteditable="true"]:hover {
      background-color: rgba(245, 158, 11, 0.08); 
      outline: 1.5px dashed rgba(245, 158, 11, 0.5);
      cursor: text;
    }
    [contenteditable="true"]:focus {
      background-color: rgba(245, 158, 11, 0.12);
      outline: 2px solid #d97706;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
    }
    [contenteditable="true"]:empty::before {
      content: "입력";
      color: #cbd5e1;
      font-style: italic;
    }

    .name-placeholder[contenteditable="true"]:empty::before {
      content: "" !important;
    }

    /* 실측 A4 크기 지면 내부 패딩 규칙 */
    .print-page-inner {
      width: 100%;
      height: 100%;
      padding: 18mm 20mm 23.5mm 20mm;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      position: relative;
    }

    .p-inner-content {
      column-rule-color: var(--grid-color) !important;
      column-rule-style: dashed !important;
      column-rule-width: 1px !important;
    }

    .print-page {
      page-break-after: auto !important;
      break-after: auto !important;
      page-break-before: auto !important;
      break-before: auto !important;
      page-break-inside: avoid !important;
      break-inside: avoid !important;
      will-change: transform;
      transform: translate3d(0, 0, 0);
    }
    .print-page:last-child, .print-page:last-of-type {
      page-break-after: auto !important;
      break-after: auto !important;
      page-break-inside: avoid !important;
      break-inside: avoid !important;
    }

    /* 인쇄 모드 최적화 미디어 쿼리 (출력 오차 방어 및 수동 포커스 잔상 제거) */
    @media print {
      .no-print {
        display: none !important;
      }
      
      html, body {
        display: block !important;
        background-color: #ffffff !important;
        margin: 0 !important;
        padding: 0 !important;
        width: auto !important;
        height: auto !important;
        min-height: 0 !important;
        overflow: visible !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      #main-layout-container,
      main,
      #print-area-wrapper,
      #pages-container {
        display: block !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        height: auto !important;
        min-height: 0 !important;
        overflow: visible !important;
        box-shadow: none !important;
        background: transparent !important;
      }

      #pages-container {
        contain: none !important;
        align-items: stretch !important;
      }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .border-2 {
        border-width: 2px !important;
        border-style: solid !important;
      }
      .border-dashed { border-style: dashed !important; }
      .border-b { border-bottom-width: 1px !important; border-bottom-style: solid !important; }
      .border-r { border-right-width: 1px !important; border-right-style: solid !important; }
      .border-t-0 { border-top-width: 0px !important; }
      .border-b-0 { border-bottom-width: 0px !important; }
      .rounded-b-none { border-bottom-left-radius: 0px !important; border-bottom-right-radius: 0px !important; }
      .rounded-t-none { border-top-left-radius: 0px !important; border-top-right-radius: 0px !important; }
      .rounded-none { border-radius: 0px !important; }

      /* [교정] 화면 축소용 래퍼의 레이아웃 간섭을 'display: contents'로 완벽 제거 */
      .page-scale-wrapper {
        display: contents !important;
      }

      .print-page {
        box-shadow: none !important;
        margin: 0 !important;
        border: none !important;
        width: var(--print-page-width) !important;
        height: var(--print-page-height) !important;
        max-width: var(--print-page-width) !important;
        max-height: var(--print-page-height) !important;
        break-after: auto !important;
        page-break-after: auto !important;
        break-before: auto !important;
        page-break-before: auto !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        box-sizing: border-box !important;
        display: block !important; 
        position: relative !important;
        float: none !important;
        clear: both !important;
        overflow: visible !important;
        background-color: white !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        /* [교정] 인라인 줌 배율이 인쇄에 간섭하지 않도록 차단 */
        transform: none !important;
        top: 0 !important;
        left: 0 !important;
      }

      .print-page + .print-page {
        break-before: page !important;
        page-break-before: always !important;
        -webkit-column-break-before: always !important;
      }

      .print-page:last-child, .print-page:last-of-type {
        break-after: auto !important;
        page-break-after: auto !important;
        -webkit-column-break-after: auto !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      /* 인쇄 시 지저분한 편집 잔상 및 아웃라인을 강제로 소거 */
      [contenteditable="true"] {
        outline: none !important;
        border-color: transparent !important;
        background-color: transparent !important;
        box-shadow: none !important;
      }

      [contenteditable="true"]:empty::before {
        content: "" !important;
        display: none !important;
      }
    }

    /* 화면 프리뷰용 실측 A4 박스 쉐도우 및 스타일 */
    .a4-page {
      background: white;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08), 0 5px 15px rgba(0, 0, 0, 0.04);
      padding: 0; 
      box-sizing: border-box;
      display: block;
      position: relative;
      margin-bottom: 2.5rem;
    }

    /* 스크롤바 디자인 정밀 단일화 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f8fafc;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    @media screen {
      .page-scale-wrapper {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        position: relative;
      }
      .print-page {
        margin-bottom: 0 !important;
      }
    }

    /* 1024px 이상 데스크톱 브라우저 환경 독립 고정 레이아웃 */
    @media screen and (min-width: 1024px) {
      html, body {
        height: 100vh !important;
        overflow: hidden !important;
      }
      #main-layout-container {
        height: calc(100vh - 72px) !important;
        overflow: hidden !important;
      }
      aside {
        height: calc(100vh - 72px) !important;
        overflow-y: auto !important;
      }
      /* 가로세로 고배율 확대 시 잘림 방지를 위해 overflow: auto로 양방향 스크롤 허용 */
      main {
        height: calc(100vh - 72px) !important;
        overflow: auto !important;
        touch-action: pan-y;
      }
    }

    /* 1024px 미만 소형 웹뷰/모바일 환경을 위한 무중력 풀-스크롤 대응 설계 */
    @media screen and (max-width: 1023px) {
      html, body {
        height: auto !important;
        overflow: auto !important;
      }
      #main-layout-container {
        height: auto !important;
        overflow: visible !important;
      }
      aside {
        height: auto !important;
        overflow-y: visible !important;
      }
      main {
        height: auto !important;
        overflow-y: visible !important;
        touch-action: pan-y;
      }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <header class="bg-slate-900 text-white shadow-md no-print py-4 px-6 flex justify-between items-center z-10 shrink-0">
    <div class="flex items-center space-x-3">
      <div class="bg-emerald-600 p-2 rounded-lg">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight">필사 용지 만들기</h1>
      </div>
    </div>
  </header>

  <!-- 메인 작업 분할 영역 -->
  <div id="main-layout-container" class="flex-1 flex flex-col lg:flex-row min-h-0">
    
    <!-- 왼쪽 사이드바: 설정 영역 제어 보드 -->
    <aside class="w-full lg:w-[420px] bg-white border-r border-slate-200 no-print shrink-0 flex flex-col">
      
      <!-- [고정] 인쇄 및 PDF 저장 버튼 패널 -->
      <div class="p-6 pb-4 border-b border-slate-200 bg-white z-20 shrink-0">
        <button onclick="window.print()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-md flex items-center justify-center space-x-2 transition-all active:scale-[0.98]">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path>
          </svg>
          <span class="text-base tracking-wide">인쇄 및 PDF로 저장</span>
        </button>
        <div class="flex gap-2 mt-2">
          <button onclick="exportSettings()" class="flex-1 bg-blue-50 hover:bg-blue-100 text-blue-700 text-sm font-semibold py-1.5 rounded-lg border border-blue-200 transition-all active:scale-[0.98]">
            내용/설정 저장하기
          </button>
          <button onclick="document.getElementById('import-settings-file').click()" class="flex-1 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-sm font-semibold py-1.5 rounded-lg border border-emerald-200 transition-all active:scale-[0.98]">
            불러오기
          </button>
        </div>
        <input type="file" id="import-settings-file" accept=".json" onchange="importSettings(event)" class="hidden">
      </div>

      <!-- [스크롤 영역] 셋팅 및 구성 필드 패널 -->
      <div class="flex-1 overflow-y-auto p-6 pt-4 space-y-6">
        
        <!-- 1. 용지 방향 -->
        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">1. 용지 방향</label>
          <div class="grid grid-cols-2 gap-2">
            <button id="btn-portrait" onclick="setOrientation('portrait')" class="py-2.5 px-4 rounded-lg border-2 border-emerald-600 bg-emerald-50 text-emerald-800 font-bold text-sm transition-all flex items-center justify-center space-x-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              <span>세로 모드</span>
            </button>
            <button id="btn-landscape" onclick="setOrientation('landscape')" class="py-2.5 px-4 rounded-lg border border-slate-300 bg-white text-slate-700 font-medium text-sm transition-all flex items-center justify-center space-x-2">
              <svg class="w-4 h-4 rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              <span>가로 모드</span>
            </button>
          </div>
        </div>

        <!-- 2. 글 제목 -->
        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">2. 글 제목</label>
          <input type="text" id="input-title" value="별 헤는 밤" class="w-full p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium" placeholder="필사할 글의 제목을 적어주세요.">
        </div>

        <!-- 3. 필사할 원문 붙여넣기 -->
        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm flex justify-between items-center">
            <span>3. 필사할 원문 붙여넣기</span>
            <span id="char-counter" class="text-xs font-normal text-slate-500">0자 입력됨</span>
          </label>
          <textarea id="source-text" class="w-full h-36 p-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm leading-relaxed" placeholder="여기에 필사할 원문을 붙여 넣으세요."></textarea>
        </div>

        <!-- 4. 원고지 설정 -->
        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">4. 원고지 설정</label>
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-4">
            
            <!-- 원고지 가로 칸 수 -->
            <div>
              <span class="block text-slate-600 font-semibold text-xs mb-1.5">원고지 가로 칸 수</span>
              <select id="grid-cols-select" class="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm bg-white">
                <option value="10">10칸 (초등 저학년 / 큰 글자)</option>
                <option value="12">12칸</option>
                <option value="14">14칸</option>
                <option value="16">16칸</option>
                <option value="18">18칸</option>
                <option value="20" selected>20칸 (표준 200자형 / 500자)</option>
                <option value="22">22칸</option>
                <option value="24">24칸 (집중도 높은 필사용)</option>
                <option value="line">줄 노트 (가로줄만 표시)</option>
              </select>
            </div>

            <!-- 세부 옵션 체크박스 4종 -->
            <div class="space-y-2 pt-1 border-t border-slate-200/60">
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="hide-manuscript-header" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
                <span class="ml-2.5 text-xs text-slate-700 font-bold">원고지 페이지에 이름 등 표시 안 함</span>
              </label>
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="hide-char-count" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
                <span class="ml-2.5 text-xs text-slate-700 font-bold">원고지 오른쪽 글자 수 표시 안 함</span>
              </label>
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="hide-grid-guides" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
                <span class="ml-2.5 text-xs text-slate-700 font-bold">원고지 가운데 점선 표시 안 함</span>
              </label>
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="hide-page-numbers" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
                <span class="ml-2.5 text-xs text-slate-700 font-bold">꼬리말, 페이지 번호 표시 안 함</span>
              </label>
            </div>

            <!-- 글자 상하 위치 미세 조정 -->
            <div class="pt-3 border-t border-slate-200/60">
              <label class="block text-slate-700 font-bold mb-1 text-xs flex justify-between">
                <span>글자 상하 위치 미세 조정</span>
                <span id="charYOffsetVal" class="text-emerald-600 font-bold">0%</span>
              </label>
              <input type="range" id="charYOffsetSlider" min="-15" max="15" step="0.5" value="0" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-600" oninput="updateCharYOffset(this.value)">
              <p class="text-[10px] text-slate-400 mt-1">시스템 환경에 따라 원고지 안의 글자 높이가 맞지 않을 때 슬라이더로 올리거나 내리세요.</p>
            </div>

            <!-- 원고지 및 점선 색상 팔레트 -->
            <div class="pt-3 border-t border-slate-200/60 space-y-3">
              <div>
                <span class="block text-slate-600 font-semibold text-xs mb-1.5">원고지 색</span>
                <div class="flex flex-wrap gap-2 items-center">
                  <button onclick="setGridColor('#000000')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" title="검은색" style="background-color: #000000;">
                    <span class="grid-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>
                  </button>
                  <button onclick="setGridColor('#69afa0')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" title="녹색" style="background-color: #69afa0;">
                    <span class="grid-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>
                  </button>
                  <button onclick="setGridColor('#ff8c8c')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" title="빨간색" style="background-color: #ff8c8c;">

    <!-- [교정] 가로/세로 오버플로우와 미리보기 프레임 처리 마운트 구역 -->

  <!-- [커스텀 대화상자 모달] alert() 및 confirm() 사용 금지 규정 준수를 위한 모달 마운트 -->
  <div id="custom-modal-overlay" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm hidden items-center justify-center z-50 transition-opacity duration-200 no-print">
    <div class="bg-white rounded-2xl max-w-sm w-full mx-4 shadow-2xl p-6 border border-slate-100 flex flex-col">
      <div class="flex items-start space-x-3.5">
        <div id="modal-icon-container" class="p-2.5 rounded-xl bg-amber-50 text-amber-600 shrink-0">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
          </svg>
        </div>
        <div class="flex-1">
          <h3 id="modal-title" class="text-base font-bold text-slate-800 leading-snug">알림</h3>
          <p id="modal-message" class="text-xs text-slate-500 mt-1 leading-relaxed">내용을 확인해주세요.</p>
        </div>
      </div>
      <div class="mt-6 flex justify-end space-x-2 shrink-0">
        <button id="modal-btn-cancel" onclick="closeCustomModal(false)" class="px-4 py-2 text-xs font-bold text-slate-500 hover:bg-slate-50 rounded-xl transition-all">취소</button>
        <button id="modal-btn-confirm" onclick="closeCustomModal(true)" class="px-5 py-2 text-xs font-bold text-white bg-emerald-600 hover:bg-emerald-500 rounded-xl shadow-md transition-all">확인</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';
  
    // 글로벌 텍스트 및 기본 메타 데이터 정의
    let sourceText = "계절이 지나가는 하늘에는\n가을로 가득 차 있습니다.\n\n나는 아무 걱정도 없이\n가을 속의 별들을 다 헤일 듯합니다.\n\n가슴 속에 하나 둘 새겨지는 별을\n이제 다 못 헤는 것은\n쉬이 아침이 오는 까닭이요,\n내일 밤이 남은 까닭이요,\n아직 나의 청춘이 다하지 않은 까닭입니다.\n\n별 하나에 추억과\n별 하나에 사랑과\n별 하나에 쓸쓸함과\n별 하나에 동경과\n별 하나에 시와\n별 하나에 어머니, 어머니";
    let articleTitle = "별 헤는 밤";
    let gridCols = "20"; 
    let schoolName = "건국초등학교";
    let gradeInfo = "";
    let studentName = "";
    let excludeFirstPage = false; 
    let hideManuscriptHeader = false; 
    let hideCharCount = false;
    let hidePageNumbers = false; 
    let orientation = "portrait";

    let headerLeftText = "";
    
    // 하단 라벨 정보 정의
    const footerSourceText = "원문 읽기";
    const footerGuideText = "따라 쓰기";
    const footerEmptyText = "원고지";

    // 사용자가 직접 편집한 머리말 및 꼬리말 텍스트 상태 변수
    let customFooterSourceText = null;
    let customFooterGuideText = null;
    let customFooterEmptyText = null;

    // 실시간 색상 및 불투명도 전역 상태 변수
    let currentGridColor = '#69afa0';
    let currentGuideColor = '#ff8c8c';
    let gridOpacity = 1.0;
    let guideOpacity = 0.35;

    // 화면 프리뷰 배율 제어 상태 변수 (width / page / manual)
    let previewZoomMode = 'width'; 
    let previewZoomValue = 100;   
    window.savedPatternGuide = true;
    window.savedPatternEmpty = true;
    window.savedHideGridGuides = false;
    window.savedCharYOffset = 0;

    // Layout Thrashing 최적화용 캐싱 수치 변수 선언
    let cachedPageWidth = 0;
    let cachedPageHeight = 0;

    // 커스텀 대화상자(Confirm/Alert) 상태를 보존할 콜백 객체
    let activeModalCallback = null;

    // 대용량 텍스트 경고 모달 중복 팝업 차단용 상태 변수
    window.hasShownLengthWarning = false;

    // 디바운싱(Debounce) 구현 (무거운 조판 연산 딜레이 적용)
    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    // 자동 저장 및 꼬리말 문구 복합 보존
    function saveToLocalStorage() {
      const data = {
        sourceText,
        articleTitle,
        schoolName,
        gradeInfo,
        studentName,
        gridCols,
        excludeFirstPage,
        hideManuscriptHeader,
        hideCharCount,
        hidePageNumbers,
        orientation,
        currentGridColor,
        currentGuideColor,
        gridOpacity,
        guideOpacity,
        headerLeftText,
        customFooterSourceText,
        customFooterGuideText,
        customFooterEmptyText,
        hideGridGuides: document.getElementById('hide-grid-guides').checked,
        patternGuide: document.getElementById('pattern-guide').checked,
        patternEmpty: document.getElementById('pattern-empty').checked,
        charYOffset: document.getElementById('charYOffsetSlider').value
      };
      localStorage.setItem('manuscriptPaperData', JSON.stringify(data));
    }

    // JSON 복합 데이터 불러오기 및 기본값 안전 검증(Null-Guard) 탑재
    function loadFromLocalStorage() {
      const saved = localStorage.getItem('manuscriptPaperData');
      if (!saved) return;

      const data = JSON.parse(saved);
      sourceText = data.sourceText ?? sourceText;
      articleTitle = data.articleTitle ?? articleTitle;
      schoolName = data.schoolName ?? schoolName;
      gradeInfo = data.gradeInfo ?? gradeInfo;
      studentName = data.studentName ?? studentName;
      gridCols = data.gridCols ?? gridCols;
      excludeFirstPage = data.excludeFirstPage ?? excludeFirstPage;
      hideManuscriptHeader = data.hideManuscriptHeader ?? hideManuscriptHeader;
      hideCharCount = data.hideCharCount ?? hideCharCount;
      hidePageNumbers = data.hidePageNumbers ?? hidePageNumbers;
      orientation = data.orientation ?? orientation;
      currentGridColor = data.currentGridColor ?? currentGridColor;
      currentGuideColor = data.currentGuideColor ?? currentGuideColor;
      gridOpacity = data.gridOpacity ?? gridOpacity;
      guideOpacity = data.guideOpacity ?? guideOpacity;
      headerLeftText = data.headerLeftText ?? headerLeftText;
      customFooterSourceText = data.customFooterSourceText ?? null;
      customFooterGuideText = data.customFooterGuideText ?? null;
      customFooterEmptyText = data.customFooterEmptyText ?? null;
      window.savedHideGridGuides = data.hideGridGuides ?? false;
      window.savedPatternGuide = data.patternGuide ?? true;
      window.savedPatternEmpty = data.patternEmpty ?? true;
      window.savedCharYOffset = Number(data.charYOffset) ?? 0;    
    }

    function applyLoadedDataToUI() {
      document.getElementById('source-text').value = sourceText;
      document.getElementById('input-title').value = articleTitle;
      document.getElementById('input-school').value = schoolName;
      document.getElementById('input-grade').value = gradeInfo;
      document.getElementById('input-name').value = studentName;
      document.getElementById('grid-cols-select').value = gridCols;
      document.getElementById('hide-manuscript-header').checked = hideManuscriptHeader;
      document.getElementById('hide-char-count').checked = hideCharCount;
      document.getElementById('hide-page-numbers').checked = hidePageNumbers;
      document.getElementById('hide-grid-guides').checked = window.savedHideGridGuides;
      document.getElementById('pattern-guide').checked = window.savedPatternGuide;
      document.getElementById('pattern-empty').checked = window.savedPatternEmpty;
      document.getElementById('exclude-first-page').checked = !excludeFirstPage;
      document.getElementById('char-counter').textContent = `${sourceText.length}자 입력됨`;
      document.title = articleTitle ? articleTitle : "필사 용지 만들기";
    }

    function showCustomAlert(title, message) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-message').textContent = message;
      document.getElementById('modal-btn-cancel').classList.add('hidden');
      document.getElementById('modal-icon-container').className = "p-2.5 rounded-xl bg-amber-50 text-amber-600 shrink-0";
      document.getElementById('custom-modal-overlay').classList.remove('hidden');
      document.getElementById('custom-modal-overlay').classList.add('flex');
      activeModalCallback = null;
    }

    // 색상 변환 유틸리티
    function hexToRgba(hex, alpha = 0.35) {
      hex = hex.replace('#', '');
      let r = parseInt(hex.substring(0, 2), 16);
      let g = parseInt(hex.substring(2, 4), 16);
      let b = parseInt(hex.substring(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function setGridColor(val, isCustom = false) {
      currentGridColor = val;
      document.documentElement.style.setProperty('--grid-color', val);

    // 파일 내보내기 및 데이터 스캔 유효성 연계
    async function exportSettings() {
      const data = getCurrentSettings();
      const json = JSON.stringify(data, null, 2);

      if (window.showSaveFilePicker) {
        try {
          const fileHandle = await window.showSaveFilePicker({
            suggestedName: '필사용지설정.json',
            types: [{
              description: 'JSON 파일',
              accept: { 'application/json': ['.json'] }
            }]
          });
          const writable = await fileHandle.createWritable();
          await writable.write(json);
          await writable.close();
        } catch (err) {
          console.log('저장 취소');
        }
        return;
      }

      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '필사용지설정.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // 입출력 안전 가드레일 JSON 수신
    function importSettings(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        let data;
        try {
          data = JSON.parse(e.target.result);
        } catch(error) {
          showCustomAlert('가져오기 실패', '올바른 설정 파일(JSON)이 아닙니다.');
          return;
        }

        if (typeof data !== 'object' || data === null || !('sourceText' in data)) {
          showCustomAlert('가져오기 실패', '필사용지 설정 파일 규격에 일치하지 않습니다.');
          return;
        }

        // 유효 셋업 전입 가드
        sourceText = data.sourceText ?? sourceText;
        articleTitle = data.articleTitle ?? articleTitle;
        schoolName = data.schoolName ?? schoolName;
        gradeInfo = data.gradeInfo ?? gradeInfo;
        studentName = data.studentName ?? studentName;
        gridCols = data.gridCols ?? gridCols;
        excludeFirstPage = data.excludeFirstPage ?? excludeFirstPage;
        hideManuscriptHeader = data.hideManuscriptHeader ?? hideManuscriptHeader;
        hideCharCount = data.hideCharCount ?? hideCharCount;
        hidePageNumbers = data.hidePageNumbers ?? hidePageNumbers;
        orientation = data.orientation ?? orientation;
        currentGridColor = data.currentGridColor ?? currentGridColor;
        currentGuideColor = data.currentGuideColor ?? currentGuideColor;
        gridOpacity = data.gridOpacity ?? gridOpacity;
        guideOpacity = data.guideOpacity ?? guideOpacity;
        headerLeftText = data.headerLeftText ?? "";
        customFooterSourceText = data.customFooterSourceText ?? null;
        customFooterGuideText = data.customFooterGuideText ?? null;
        customFooterEmptyText = data.customFooterEmptyText ?? null;
        window.savedHideGridGuides = data.hideGridGuides ?? false;
        window.savedPatternGuide = data.patternGuide ?? true;
        window.savedPatternEmpty = data.patternEmpty ?? true;

        applyLoadedDataToUI();
        document.getElementById('hide-grid-guides').checked = window.savedHideGridGuides;
        document.getElementById('pattern-guide').checked = window.savedPatternGuide;
        document.getElementById('pattern-empty').checked = window.savedPatternEmpty;
        
        updatePageStyleSheet();
        setOrientation(orientation);
        setGridColor(currentGridColor, true);
        setGuideColor(currentGuideColor, true);
        updateGridOpacity(gridOpacity * 100);
        updateGuideOpacity(guideOpacity * 100);
        updateCharYOffset(data.charYOffset || 0);
        document.getElementById('charYOffsetSlider').value = data.charYOffset || 0;

        saveToLocalStorage();
      };
      reader.readAsText(file);
    }

    // 클립보드 붙여넣기 일반 텍스트화 보정
    document.addEventListener('paste', (e) => {
      const target = e.target;
      const isTargetEditable = target.hasAttribute('contenteditable') || target.id === 'source-text';
      if (!isTargetEditable) return;

      e.preventDefault();
      let text = (e.clipboardData || window.clipboardData).getData('text/plain');
      text = text.replace(/\r\n/g, '\n');
      
      if (target.id === 'source-text') {
        text = text.replace(/\n{3,}/g, '\n\n');
        const start = target.selectionStart;
        const end = target.selectionEnd;
        const currentVal = target.value;
        target.value = currentVal.substring(0, start) + text + currentVal.substring(end);
        target.selectionStart = target.selectionEnd = start + text.length;
        target.dispatchEvent(new Event('input', { bubbles: true }));
      } else {
        text = text.replace(/\n/g, ' ');
        if (document.queryCommandSupported('insertText')) {
          document.execCommand('insertText', false, text);
        } else {
          const selection = window.getSelection();
          if (selection.rangeCount) {
            selection.deleteFromDocument();
            selection.getRangeAt(0).insertNode(document.createTextNode(text));
          }
        }
        target.dispatchEvent(new Event('input', { bubbles: true }));
      }
    });

      if (!target.hasAttribute('contenteditable')) return;

      if (target.classList.contains('title-placeholder') || target.classList.contains('mini-header-center')) {

      }
    }, true);

    // 원고지 규격 자간 분석 및 콤보 문자 정렬 엔진 (불변성 100% 확보)
    function parseTextToManuscriptCells(text, cols) {
      const cells = [];
      const isAlphanumeric = (c) => /[0-9a-zA-Z]/.test(c);
      const isPunctuation = (c) => /[.,!?'"ным“('_~);:]/.test(c) || /[.,!?'""]["“”‘’()\[\]{}<>~?;:：；！？]/.test(c);
      
      const isPeriodOrComma = (c) => c === '.' || c === ',';
      const isQuote = (c) => /[“‘”’"']/.test(c);
      const isSymbol = (c) => /[!?！？]/.test(c); 

      const paragraphs = text.split('\n');

      paragraphs.forEach((pText, pIdx) => {
        if (pText.trim() === "" && pIdx > 0) {
          const colIndex = cells.length % cols;
          if (colIndex > 0) {
            const fillCount = cols - colIndex;
            for (let f = 0; f < fillCount; f++) {
              cells.push({ char: "", isSpace: true, isParagraphFiller: true });
            }
          }
          for (let f = 0; f < cols; f++) {
            cells.push({ char: "", isSpace: true, isParagraphFiller: true });
          }
          return;
        }

        if (pIdx > 0) {
          const colIndex = cells.length % cols;
          if (colIndex > 0) {
            const fillCount = cols - colIndex;
            for (let f = 0; f < fillCount; f++) {
              cells.push({ char: "", isSpace: true, isParagraphFiller: true });
            }
          }
        }

        cells.push({ char: " ", isSpace: true, isParagraphStartSpace: true });

        let charIdx = 0;
        while (charIdx < pText.length) {
          let char = pText[charIdx];
          let nextChar = pText[charIdx + 1];
          let colIndex = cells.length % cols;

          const isAtRowEnd = (colIndex === 0 && cells.length > 0);

          if (isPunctuation(char) && isAtRowEnd) {
            let targetIdx = cells.length - 1;
            if (cells[targetIdx] && !cells[targetIdx].isParagraphFiller && !cells[targetIdx].squeezedPunct) {
              cells[targetIdx].squeezedPunct = char; 
              cells[targetIdx].isSqueezed = true;
              charIdx += 1;
              continue;
            }
          }

          if (isPeriodOrComma(char) && nextChar && (nextChar === '“' || nextChar === '‘')) {
            cells.push({
              char: char,
              squeezedPunct: nextChar,
              isPeriodOpeningQuoteCombo: true
            });
            charIdx += 2;
            continue;
          }

          if (isPeriodOrComma(char) && nextChar && (nextChar === '”' || nextChar === '’' || nextChar === '"' || nextChar === "'")) {
            cells.push({
              char: char,
              squeezedPunct: nextChar,
              isPeriodQuoteCombo: true
            });
            charIdx += 2;
            continue;
          }

          if (isSymbol(char) && nextChar && isQuote(nextChar)) {
            cells.push({
              char: char,
              squeezedPunct: nextChar,
              isSymbolFirstCombo: true
            });
            charIdx += 2;
            continue;
          }

          if (isQuote(char) && nextChar && isSymbol(nextChar)) {
            cells.push({
              char: char,
              squeezedPunct: nextChar,
              isQuoteFirstCombo: true
            });
            charIdx += 2;
            continue;
          }

          if (isPunctuation(char) && nextChar && isPunctuation(nextChar)) {
            cells.push({
              char: char,
              squeezedPunct: nextChar,
              isDoublePunct: true
            });
            charIdx += 2;
            continue;
          }

          if (char === ' ') {
            if (colIndex === 0) {
              charIdx++;
              continue;
            }
            if (cells.length > 0) {
              const prevCell = cells[cells.length - 1];
              if (prevCell && (prevCell.char === '.' || prevCell.char === ',')) {
                if (prevCell.isPeriodQuoteCombo) {
                  cells.push({ char: " ", isSpace: true });
                  charIdx++;
                  continue;
                }
                charIdx++;
                continue;
              }
            }
            cells.push({ char: " ", isSpace: true });
            charIdx++;
            continue;
          }

          if (isAlphanumeric(char)) {
            let nextChar = pText[charIdx + 1];
            if (nextChar && isAlphanumeric(nextChar)) {
              cells.push({ char: char + nextChar, isAlphanumeric: true });
              charIdx += 2;
            } else {
              cells.push({ char: char, isAlphanumeric: true });
              charIdx += 1;
            }
            continue;
          }

          cells.push({ char: char });
          charIdx++;
        }

        const endColIndex = cells.length % cols;
        if (endColIndex > 0) {
          const fillCount = cols - endColIndex;
          for (let f = 0; f < fillCount; f++) {
            cells.push({ char: "", isSpace: true, isParagraphFiller: true });
          }
        }
      });

      return cells;
    }

    function calculateOptimalRows(cols) {
      if (cols === "line") {
        if (orientation === 'portrait') {
          return hideManuscriptHeader ? 24 : 21; 
        } else {
          return hideManuscriptHeader ? 16 : 13; 
        }
      }
      const colsNum = parseInt(cols);
      
      if (colsNum === 20 && orientation === 'portrait') {
        return 25;
      }
      
      const usableWidthMm = (orientation === 'portrait') ? 170 : 257;
      const cellWidthMm = usableWidthMm / colsNum;
      
      const usableHeightMm = (orientation === 'portrait')
        ? (hideManuscriptHeader ? 228 : 208)
        : (hideManuscriptHeader ? 158 : 133);

      return Math.floor(usableHeightMm / cellWidthMm);
    }

    // 줄 수 정밀 계산 유틸리티
    function estimateLinesForSegments(segments, fontSizePt) {
      const charWidthMm = fontSizePt * 0.3527; 
      const maxLineWidthMm = (orientation === 'portrait') ? 155 : 112; 

      let totalLines = 0;

      function getCharWidthMm(char) {
        if (/[0-9a-zA-Z]/.test(char)) return charWidthMm * 0.58; 
        if (char === ' ') return charWidthMm * 0.35; 
        if (/[.,!?'"ным“('_~);:]/.test(char)) return charWidthMm * 0.5; 
        return charWidthMm; 
      }

      const paragraphsToCalculate = [];
      let currentParaWords = [];
      let currentParaHasIndent = false;

      for (let i = 0; i < segments.length; i++) {
        const seg = segments[i];

        if (seg.isBlankLine) {
          if (currentParaWords.length > 0) {
            paragraphsToCalculate.push({
              text: currentParaWords.join(' '),
              words: currentParaWords,
              hasIndent: currentParaHasIndent
            });
            currentParaWords = [];
          }
          paragraphsToCalculate.push({ isBlankLine: true });
        } else {
          const prevSeg = i > 0 ? segments[i - 1] : null;
          const isNewParagraph = !prevSeg || prevSeg.isBlankLine || (prevSeg.pIdx !== seg.pIdx);

          if (isNewParagraph) {
            if (currentParaWords.length > 0) {
              paragraphsToCalculate.push({
                text: currentParaWords.join(' '),
                words: currentParaWords,
                hasIndent: currentParaHasIndent
              });
              currentParaWords = [];
            }
            currentParaHasIndent = !seg.isContinued;
          }

          const wordsInSeg = seg.text.split(' ');
          wordsInSeg.forEach((w, wIdx) => {
            if (w !== "") {
              currentParaWords.push(w);
            } else if (wIdx > 0 && wIdx < wordsInSeg.length - 1) {
              currentParaWords.push(""); 
            }
          });
        }
      }

      if (currentParaWords.length > 0) {
        paragraphsToCalculate.push({
          text: currentParaWords.join(' '),
          words: currentParaWords,
          hasIndent: currentParaHasIndent
        });
      }

      paragraphsToCalculate.forEach(p => {
        if (p.isBlankLine) {
          totalLines += 1.0;
          return;
        }

        const indentWidth = p.hasIndent ? (charWidthMm * 1.5) : 0;
        let currentLineWidth = indentWidth;
        let linesInPara = 1;

        p.words.forEach(word => {
          if (word === "") {
            currentLineWidth += getCharWidthMm(' ');
            return;
          }

          let wordWidth = 0;
          for (let char of word) {
            wordWidth += getCharWidthMm(char);
          }

          const spaceWidth = (currentLineWidth > indentWidth) ? getCharWidthMm(' ') : 0;

          if (currentLineWidth + spaceWidth + wordWidth > maxLineWidthMm) {
            linesInPara += 1;
            currentLineWidth = wordWidth;
          } else {
            currentLineWidth += spaceWidth + wordWidth;
          }
        });

        totalLines += linesInPara;
      });

      return totalLines;
    }

    function getMaxLines(fontSizePt, pageIdx) {
      if (orientation === 'portrait') {
        const baseLines = (pageIdx === 0) ? 28 : 30;
        return Math.floor(baseLines * (10 / fontSizePt));
      } else { 
        const baseLinesPerCol = (pageIdx === 0) ? 16 : 18;
        const linesPerCol = Math.floor(baseLinesPerCol * (10 / fontSizePt));
        return linesPerCol * 2; 
      }
    }

    function canFitSinglePage(paragraphs, fontSizePt) {
      const segments = [];
      paragraphs.forEach((p, pIdx) => {
        if (p.trim() === "") {
          segments.push({ isBlankLine: true, pIdx: pIdx });
        } else {
          segments.push({ text: p.trim(), isContinued: false, pIdx: pIdx });
        }
      });
      const lines = estimateLinesForSegments(segments, fontSizePt);
      const maxLines = getMaxLines(fontSizePt, 0); 
      return lines <= maxLines;
    }

    function paginateSourceText(paragraphs) {
      let globalFontSize = '12pt';
      
      if (canFitSinglePage(paragraphs, 12)) {
        globalFontSize = '12pt';
      } else if (canFitSinglePage(paragraphs, 11)) {
        globalFontSize = '11pt';
      } else if (canFitSinglePage(paragraphs, 10)) {
        globalFontSize = '10pt';
      } else {
        globalFontSize = '12pt'; 
      }

      const fontSizeNum = parseInt(globalFontSize);

      const stream = [];
      paragraphs.forEach((p, pIdx) => {
        const trimmed = p.trim();
        if (trimmed === "") {
          stream.push({ type: 'blank', pIdx: pIdx });
        } else {
          const sentences = trimmed.split(/(?<=[.?!])\s+/);
          sentences.forEach((s, idx) => {
            if (s.trim() !== "") {
              stream.push({
                type: 'sentence',
                text: s.trim(),
                isParaStart: (idx === 0),
                pIdx: pIdx
              });
            }
          });
        }
      });

      const pages = [];
      let currentPageIdx = 0;
      let currentPageSegments = [];

      for (let i = 0; i < stream.length; i++) {
        const item = stream[i];
        let candidateSegments = [...currentPageSegments];
        let nextSegment;

        if (item.type === 'blank') {
          nextSegment = { isBlankLine: true, pIdx: item.pIdx };
        } else {
          const isContinued = !item.isParaStart;
          nextSegment = { text: item.text, isContinued: isContinued, pIdx: item.pIdx };
        }

        candidateSegments.push(nextSegment);

        const maxLines = getMaxLines(fontSizeNum, currentPageIdx);
        const estimated = estimateLinesForSegments(candidateSegments, fontSizeNum);

        if (estimated <= maxLines) {
          currentPageSegments.push(nextSegment);
        } else {
          if (currentPageSegments.length > 0) {
            pages.push({ segments: [...currentPageSegments], fontSize: globalFontSize });
            currentPageSegments = [];
            currentPageIdx++;

            if (item.type === 'sentence') {
              const isContinuedOnNewPage = !item.isParaStart;
              currentPageSegments.push({ text: item.text, isContinued: isContinuedOnNewPage, pIdx: item.pIdx });
            } else {
              currentPageSegments.push({ isBlankLine: true, pIdx: item.pIdx });
            }
          } else {
            currentPageSegments.push(nextSegment);
          }
        }
      }
      
      if (currentPageSegments.length > 0) {
        pages.push({ segments: currentPageSegments, fontSize: globalFontSize });
      }

      return pages;
    }

    function splitTextForLineNote(text, maxNonSpace) {
      const lines = [];
      const paragraphs = text.split('\n');
      const isPunctuation = (c) => /[.,!?'"ным“('_~);:]/.test(c) || /[.,!?'""]["“”‘’()\[\]{}<>~?;:：；！？]/.test(c);

      paragraphs.forEach((p) => {
        if (p.trim() === "") {
          lines.push({ text: "", isFirstLine: false, isLastLineOfPara: true });
          return;
        }

        let chars = Array.from(p);
        let currentLineText = "";
        let currentNonSpaceCount = 0;
        let isFirstLine = true;

        let i = 0;
        while (i < chars.length) {
          let char = chars[i];
          let isSpace = (char === ' ' || char === '\t' || char === '\r');

          if (!isSpace && currentNonSpaceCount >= maxNonSpace) {
            if (isPunctuation(char)) {
              while (i < chars.length && isPunctuation(chars[i])) {
                currentLineText += chars[i];
                i++;
              }
            }
            
            lines.push({ text: currentLineText, isFirstLine: isFirstLine, isLastLineOfPara: false });
            currentLineText = "";
            currentNonSpaceCount = 0;
            isFirstLine = false;
            
            if (i < chars.length && (chars[i] === ' ' || chars[i] === '\t' || chars[i] === '\r')) {
              i++;
            }
            continue;
          }

          currentLineText += char;
          if (!isSpace) {
            currentNonSpaceCount++;
          }
          i++;
        }

        if (currentLineText.length > 0 || isFirstLine) {
          lines.push({ text: currentLineText, isFirstLine: isFirstLine, isLastLineOfPara: true });
        }
      });

      return lines;
    }

    // 핵심 조판 렌더링 함수 (중복 호출 병목 완벽 제거 버전)
    function renderPages() {
      const container = document.getElementById('pages-container');
      const fragment = document.createDocumentFragment();

      const isLineNote = (gridCols === 'line');
      const optRows = calculateOptimalRows(gridCols);
      const cellsPerPage = isLineNote ? optRows : (parseInt(gridCols) * optRows);

      const placeholders = getBlankPlaceholders();
      const pageClass = orientation === 'portrait' ? 'a4-page print-page portrait-page' : 'a4-page print-page landscape-page';

      const headerHTML = `
        <div class="flex items-center justify-between w-full text-slate-800 text-sm font-bold">
