<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>별 헤는 밤</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Noto Sans JP/KR (CJK 고딕), Noto Serif JP/KR (CJK 명조) -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;700&family=Noto+Serif+KR:wght@400;500;700" rel="stylesheet">
  
  <style>
    :root {
      --guide-display: block;
      --guide-color: rgba(239, 68, 68, 0.35);
      --grid-color: #059669;
      --char-y-offset: 0%;
    }

    .font-serif-fixed {
      font-family: 'Noto Serif JP', 'Noto Serif KR', 'Batang', 'AppleMyungjo', 'serif' !important;
      font-weight: 400 !important;
      font-style: normal !important;
    }

    body {
      font-family: 'Noto Sans JP', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background-color: #f1f5f9;
    }

    .custom-grid-border {
      border-color: var(--grid-color) !important;
    }
    .custom-grid-text {
      color: var(--grid-color) !important;
    }

    .grid-cell-guide {
      position: relative;
      box-sizing: border-box;
    }
    .grid-cell-guide::before {
      content: "";
      display: var(--guide-display) !important;
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      border-left: 1px dashed var(--guide-color) !important;
      transform: translateX(-50%);
      pointer-events: none;
    }
    .grid-cell-guide::after {
      content: "";
      display: var(--guide-display) !important;
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      border-top: 1px dashed var(--guide-color) !important;
      transform: translateY(-50%);
      pointer-events: none;
    }

    [contenteditable="true"] {
      transition: all 0.2s ease;
      border-radius: 4px;
      padding: 1px 4px;
    }
    [contenteditable="true"]:hover {
      background-color: rgba(245, 158, 11, 0.08); 
      outline: 1.5px dashed rgba(245, 158, 11, 0.5);
      cursor: text;
    }
    [contenteditable="true"]:focus {
      background-color: rgba(245, 158, 11, 0.12);
      outline: 2px solid #d97706;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
    }
    [contenteditable="true"]:empty::before {
      content: "입력";
      color: #cbd5e1;
      font-style: italic;
    }

    .name-placeholder[contenteditable="true"]:empty::before {
      content: "" !important;
    }

    .print-page-inner {
      width: 100%;
      height: 100%;
      padding: 18mm 20mm 23.5mm 20mm;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      position: relative;
    }

    .p-inner-content {
      column-rule-color: var(--grid-color) !important;
      column-rule-style: dashed !important;
      column-rule-width: 1px !important;
    }

    .print-page {
      page-break-after: always !important;
      page-break-inside: avoid !important;
    }
    .print-page:last-child, .print-page:last-of-type {
      page-break-after: avoid !important;
      page-break-inside: avoid !important;
    }

    @media print {
      .no-print {
        display: none !important;
      }
      
      html, body {
        display: block !important;
        background-color: #ffffff !important;
        margin: 0 !important;
        padding: 0 !important;
        width: auto !important;
        height: auto !important;
        min-height: 0 !important;
        overflow: visible !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      main, #print-area-wrapper, #pages-container {
        display: block !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        height: auto !important;
        min-height: 0 !important;
        box-shadow: none !important;
        background: transparent !important;
      }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .border-2 {
        border-width: 2px !important;
        border-style: solid !important;
      }
      .border-dashed {
        border-style: dashed !important;
      }
      .border-b {
        border-bottom-width: 1px !important;
        border-bottom-style: solid !important;
      }
      .border-r {
        border-right-width: 1px !important;
        border-right-style: solid !important;
      }

      .border-t-0 {
        border-top-width: 0px !important;
      }
      .border-b-0 {
        border-bottom-width: 0px !important;
      }
      .rounded-b-none {
        border-bottom-left-radius: 0px !important;
        border-bottom-right-radius: 0px !important;
      }
      .rounded-t-none {
        border-top-left-radius: 0px !important;
        border-top-right-radius: 0px !important;
      }
      .rounded-none {
        border-radius: 0px !important;
      }

      .print-page {
        box-shadow: none !important;
        margin: 0 auto !important;
        border: none !important;
        page-break-after: always !important;
        page-break-inside: avoid !important;
        box-sizing: border-box !important;
        display: block !important; 
        position: relative !important;
        overflow: visible !important;
        background-color: white !important;
      }

      .print-page:last-child, .print-page:last-of-type {
        page-break-after: avoid !important;
        page-break-inside: avoid !important;
      }

      [contenteditable="true"]:empty::before {
        content: "" !important;
        display: none !important;
      }
    }

    .a4-page {
      background: white;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08), 0 5px 15px rgba(0, 0, 0, 0.04);
      padding: 0; 
      box-sizing: border-box;
      display: block;
      position: relative;
      margin-bottom: 2.5rem;
    }

    .portrait-page {
      width: 210mm;
      height: 296mm;
    }

    .landscape-page {
      width: 297mm;
      height: 209mm; 
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f8fafc;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <header class="bg-slate-900 text-white shadow-md no-print py-4 px-6 flex justify-between items-center z-10 shrink-0">
    <div class="flex items-center space-x-3">
      <div class="bg-emerald-600 p-2 rounded-lg">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586"></path>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight">필사 용지 만들기</h1>
      </div>
    </div>
  </header>

  <div id="main-layout-container" class="flex-1 flex flex-col lg:flex-row min-h-0">
    
    <aside class="w-full lg:w-[420px] bg-white border-r border-slate-200 no-print shrink-0 lg:sticky lg:top-0 lg:h-[calc(100vh-72px)] flex flex-col">
      
      <div class="p-6 pb-4 border-b border-slate-200 bg-white z-20 shrink-0">
        <button onclick="window.print()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-md flex items-center justify-center space-x-2 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2z"></path>
          </svg>
          <span class="text-base tracking-wide">인쇄 및 PDF로 저장</span>
        </button>
      </div>

      <div class="flex-1 overflow-y-auto p-6 pt-4 space-y-6">
        
        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">1. 용지 방향</label>
          <div class="grid grid-cols-2 gap-2">
            <button id="btn-portrait" onclick="setOrientation('portrait')" class="py-2.5 px-4 rounded-lg border-2 border-emerald-600 bg-emerald-50 text-emerald-800 font-bold text-sm transition-all flex items-center justify-center space-x-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              <span>세로 모드</span>
            </button>
            <button id="btn-landscape" onclick="setOrientation('landscape')" class="py-2.5 px-4 rounded-lg border border-slate-300 bg-white text-slate-700 font-medium text-sm transition-all flex items-center justify-center space-x-2">
              <svg class="w-4 h-4 rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              <span>가로 모드</span>
            </button>
          </div>
        </div>

        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">2. 글 제목</label>
          <input type="text" id="input-title" value="별 헤는 밤" class="w-full p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium" placeholder="글의 제목을 입력하세요">
        </div>

        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm flex justify-between items-center">
            <span>3. 필사할 원문 붙여넣기</span>
            <span id="char-counter" class="text-xs font-normal text-slate-500">0자 입력됨</span>
          </label>
          <textarea id="source-text" class="w-full h-36 p-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm leading-relaxed" placeholder="여기에 필사할 원문을 붙여넣으세요"></textarea>
        </div>

        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">4. 원고지 설정</label>
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-4">
            
            <div>
              <span class="block text-slate-600 font-semibold text-xs mb-1.5">원고지 가로 칸 수</span>
              <select id="grid-cols-select" class="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm bg-white">
                <option value="10">10칸 (초등 저학년 / 큰 글자)</option>
                <option value="12">12칸</option>
                <option value="14">14칸</option>
                <option value="16">16칸</option>
                <option value="18">18칸</option>
                <option value="20" selected>20칸 (표준 200자형 / 500자)</option>
                <option value="22">22칸</option>
                <option value="24">24칸 (집중도 높은 필사용)</option>
                <option value="line">줄 노트 (가로줄만 표시)</option>
              </select>
            </div>

            <div class="space-y-2 pt-1 border-t border-slate-200/60">
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="hide-manuscript-header" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
                <span class="ml-2.5 text-xs text-slate-700 font-bold">원고지 페이지에 이름 등 표시 안 함</span>
              </label>
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="hide-char-count" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
                <span class="ml-2.5 text-xs text-slate-700 font-bold">원고지 오른쪽 글자 수 표시 안 함</span>
              </label>
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="hide-grid-guides" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
                <span class="ml-2.5 text-xs text-slate-700 font-bold">원고지 가운데 점선 표시 안 함</span>
              </label>
              <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="hide-page-numbers" class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
                <span class="ml-2.5 text-xs text-slate-700 font-bold">꼬리말, 페이지 번호 표시 안 함</span>
              </label>
            </div>

            <div class="pt-3 border-t border-slate-200/60">
              <label class="block text-slate-700 font-bold mb-1 text-xs flex justify-between">
                <span>글자 상하 위치 미세 조정</span>
                <span id="charYOffsetVal" class="text-emerald-600 font-bold">0%</span>
              </label>
              <input type="range" id="charYOffsetSlider" min="-15" max="15" step="0.5" value="0" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-600" oninput="updateCharYOffset(this.value)">
              <p class="text-[10px] text-slate-400 mt-1">시스템 환경에 따라 원고지 안의 글자 높이가 맞지 않을 때 슬라이더로 올리거나 내리세요.</p>
            </div>

            <div class="pt-3 border-t border-slate-200/60 space-y-3">
              <div>
                <span class="block text-slate-600 font-semibold text-xs mb-1.5">원고지 색</span>
                <div class="flex flex-wrap gap-2 items-center">
                  <button onclick="setGridColor('#000000')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" style="background-color: #000000;"><span class="grid-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span></button>
                  <button onclick="setGridColor('#059669')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" style="background-color: #059669;"><span class="grid-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span></button>
                  <button onclick="setGridColor('#ef4444')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" style="background-color: #ef4444;"><span class="grid-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span></button>
                  <button onclick="setGridColor('#2563eb')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" style="background-color: #2563eb;"><span class="grid-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span></button>
                  <button onclick="setGridColor('#991b1b')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" style="background-color: #991b1b;"><span class="grid-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span></button>
                  <div class="relative flex items-center"><button onclick="document.getElementById('grid-color-picker').click()" class="py-1 px-2.5 rounded-lg border border-slate-300 bg-white hover:bg-slate-50 text-[11px] font-bold text-slate-600 flex items-center gap-1.5"><span class="w-3 h-3 rounded-full border border-slate-400 bg-gradient-to-tr from-indigo-500 via-purple-500 to-pink-500"></span><span>다른 색</span></button><input type="color" id="grid-color-picker" value="#059669" class="sr-only" oninput="setGridColor(this.value, true)"></div>
                </div>
              </div>

              <div>
                <span class="block text-slate-500 font-semibold text-[11px] mb-1.5">원고지 가운데 점선 색</span>
                <div class="flex flex-wrap gap-2 items-center">
                  <button onclick="setGuideColor('#000000')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" style="background-color: #000000;"><span class="guide-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span></button>
                  <button onclick="setGuideColor('#059669')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" style="background-color: #059669;"><span class="guide-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span></button>
                  <button onclick="setGuideColor('#ef4444')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" style="background-color: #ef4444;"><span class="guide-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span></button>
                  <button onclick="setGuideColor('#2563eb')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" style="background-color: #2563eb;"><span class="guide-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span></button>
                  <button onclick="setGuideColor('#991b1b')" class="w-7 h-7 rounded-full border border-slate-300 hover:scale-105 transition-all flex items-center justify-center relative active:scale-95" style="background-color: #991b1b;"><span class="guide-color-check hidden text-white"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span></button>
                  <div class="relative flex items-center"><button onclick="document.getElementById('guide-color-picker').click()" class="py-1 px-2.5 rounded-lg border border-slate-300 bg-white hover:bg-slate-50 text-[11px] font-bold text-slate-600 flex items-center gap-1.5"><span class="w-3 h-3 rounded-full border border-slate-400 bg-gradient-to-tr from-indigo-500 via-purple-500 to-pink-500"></span><span>다른 색</span></button><input type="color" id="guide-color-picker" value="#ef4444" class="sr-only" oninput="setGuideColor(this.value, true)"></div>
                </div>
              </div>
            </div>

          </div>
        </div>

        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">5. 학생 정보</label>
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
            <div class="grid grid-cols-2 gap-3 text-xs text-slate-600">
              <div>
                <span class="block mb-1 font-medium text-slate-500">학교 이름</span>
                <input type="text" id="input-school" value="건국초등학교" class="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" placeholder="학교 이름">
              </div>
              <div>
                <span class="block mb-1 font-medium text-slate-500">학년 / 반</span>
                <input type="text" id="input-grade" value="" class="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" placeholder="학년 / 반">
              </div>
              <div class="col-span-2">
                <span class="block mb-1 font-semibold text-emerald-800">학생 이름</span>
                <input type="text" id="input-name" value="" class="w-full p-2.5 border-2 border-emerald-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600 text-sm font-bold bg-emerald-50" placeholder="학생 이름">
              </div>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-slate-700 font-bold mb-2 text-sm">6. 출력 설정</label>
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
            <label class="flex items-center cursor-pointer">
              <input type="checkbox" id="exclude-first-page" checked class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
              <span class="ml-2.5 text-xs text-slate-700 font-bold">원문 보기 표시</span>
            </label>
            <label class="flex items-center cursor-pointer">
              <input type="checkbox" id="pattern-guide" checked class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
              <span class="ml-2.5 text-xs text-slate-700 font-bold">따라쓰기 글씨 포함</span>
            </label>
            <label class="flex items-center cursor-pointer">
              <input type="checkbox" id="pattern-empty" checked class="form-checkbox h-4 w-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500">
              <span class="ml-2.5 text-xs text-slate-700 font-bold">빈 원고지</span>
            </label>
          </div>
        </div>

      </div>
    </aside>

    <main class="flex-1 bg-slate-100 overflow-y-auto p-4 md:p-8 flex flex-col items-center">
      <div id="print-area-wrapper" class="w-full flex flex-col items-center">
        <div id="pages-container" class="flex flex-col items-center"></div>
      </div>
    </main>

  </div>

  <script>
    let sourceText = "계절이 지나가는 하늘에는\n가을로 가득 차 있습니다.\n\n나는 아무 걱정도 없이\n가을 속의 별들을 다 헤일 듯합니다.\n\n가슴속에 하나둘이 셀 수 있는\n별들을 다 헤다가도\n\n저 별 하나 빠뜨릴 듯 하여\n다시 셀 듯합니다.\n\n밤을 새워 우는 벌레는\n부절런 늘어난 그 별까지\n다 헤는 셈 같고\n\n당신이 함께 계신 곳까지는\n백 길도 못 가\n마침내 외로워 파\n\n언제나 그 별 위에다\n내 상象 긔를 놓고픈 마음 아닙니다.";
    let articleTitle = "별 헤는 밤";
    let gridCols = "20"; 
    let schoolName = "건국초등학교";
    let gradeInfo = "";
    let studentName = "";
    let excludeFirstPage = false; 
    let hideManuscriptHeader = false; 
    let hideCharCount = false;
    let hidePageNumbers = false;
    let orientation = "portrait";
    let currentGridColor = '#059669';
    let currentGuideColor = '#ef4444';

    document.getElementById('source-text').value = sourceText;
    document.getElementById('char-counter').textContent = `${sourceText.length}자 입력됨`;
    document.title = articleTitle;

    document.getElementById('source-text').addEventListener('input', (e) => {
      sourceText = e.target.value;
      document.getElementById('char-counter').textContent = `${sourceText.length}자 입력됨`;
      renderPages();
    });

    document.getElementById('input-title').addEventListener('input', (e) => {
      articleTitle = e.target.value;
      document.title = articleTitle || "필사 용지 만들기";
      renderPages();
    });

    document.getElementById('grid-cols-select').addEventListener('change', (e) => {
      gridCols = e.target.value;
      renderPages();
    });

    ['input-school', 'input-grade', 'input-name'].forEach(id => {
      document.getElementById(id).addEventListener('input', (e) => {
        if (id === 'input-school') schoolName = e.target.value;
        if (id === 'input-grade') gradeInfo = e.target.value;
        if (id === 'input-name') studentName = e.target.value;
        renderPages();
      });
    });

    document.getElementById('pattern-guide').addEventListener('change', renderPages);
    document.getElementById('pattern-empty').addEventListener('change', renderPages);
    document.getElementById('exclude-first-page').addEventListener('change', (e) => {
      excludeFirstPage = !e.target.checked;
      renderPages();
    });
    document.getElementById('hide-manuscript-header').addEventListener('change', (e) => {
      hideManuscriptHeader = e.target.checked;
      renderPages();
    });
    document.getElementById('hide-char-count').addEventListener('change', (e) => {
      hideCharCount = e.target.checked;
      renderPages();
    });
    document.getElementById('hide-page-numbers').addEventListener('change', (e) => {
      hidePageNumbers = e.target.checked;
      renderPages();
    });
    document.getElementById('hide-grid-guides').addEventListener('change', updateGridGuides);

    function hexToRgba(hex, alpha = 0.35) {
      hex = hex.replace('#', '');
      let r = parseInt(hex.substring(0, 2), 16);
      let g = parseInt(hex.substring(2, 4), 16);
      let b = parseInt(hex.substring(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function setGridColor(val, isCustom = false) {
      currentGridColor = val;
      document.documentElement.style.setProperty('--grid-color', val);
      const buttons = document.querySelectorAll('.grid-color-check');
      buttons.forEach(el => el.classList.add('hidden'));
      if (!isCustom) {
        const matchedBtn = document.querySelector(`button[onclick="setGridColor('${val}')"] .grid-color-check`);
        if (matchedBtn) matchedBtn.classList.remove('hidden');
      }
    }

    function setGuideColor(val, isCustom = false) {
      currentGuideColor = val;
      updateGridGuides();
      const checks = document.querySelectorAll('.guide-color-check');
      checks.forEach(el => el.classList.add('hidden'));
      if (!isCustom) {
        const matchedBtn = document.querySelector(`button[onclick="setGuideColor('${val}')"] .guide-color-check`);
        if (matchedBtn) matchedBtn.classList.remove('hidden');
      }
    }

    function updateGridGuides() {
      const hideGuides = document.getElementById('hide-grid-guides').checked;
      document.documentElement.style.setProperty('--guide-display', hideGuides ? 'none' : 'block');
      document.documentElement.style.setProperty('--guide-color', hexToRgba(currentGuideColor, 0.35));
    }

    function updateCharYOffset(val) {
      document.getElementById('charYOffsetVal').innerText = (val > 0 ? '+' : '') + val + '%';
      document.documentElement.style.setProperty('--char-y-offset', val + '%');
    }

    function setOrientation(mode) {
      orientation = mode;
      document.getElementById('btn-portrait').className = mode === 'portrait' 
        ? "py-2.5 px-4 rounded-lg border-2 border-emerald-600 bg-emerald-50 text-emerald-800 font-bold text-sm transition-all flex items-center justify-center space-x-2"
        : "py-2.5 px-4 rounded-lg border border-slate-300 bg-white text-slate-700 font-medium text-sm transition-all flex items-center justify-center space-x-2";
      document.getElementById('btn-landscape').className = mode === 'landscape'
        ? "py-2.5 px-4 rounded-lg border-2 border-emerald-600 bg-emerald-50 text-emerald-800 font-bold text-sm transition-all flex items-center justify-center space-x-2"
        : "py-2.5 px-4 rounded-lg border border-slate-300 bg-white text-slate-700 font-medium text-sm transition-all flex items-center justify-center space-x-2";
      updatePageStyleSheet();
      renderPages();
    }

    function updatePageStyleSheet() {
      let styleEl = document.getElementById('dynamic-page-style');
      if (!styleEl) {
        styleEl = document.createElement('style');
        styleEl.id = 'dynamic-page-style';
        document.head.appendChild(styleEl);
      }
      if (orientation === 'portrait') {
        styleEl.innerHTML = `@page { size: A4 portrait; margin: 0; } .print-page { width: 210mm; height: 296mm; }`;
      } else {
        styleEl.innerHTML = `@page { size: A4 landscape; margin: 0; } .print-page { width: 297mm; height: 209mm; }`;
      }
    }

    function renderPages() {
      const container = document.getElementById('pages-container');
      container.innerHTML = '';

      // 원문 페이지
      if (!excludeFirstPage) {
        const sourceDiv = document.createElement('div');
        sourceDiv.className = `a4-page ${orientation === 'portrait' ? 'portrait-page' : 'landscape-page'} print-page`;
        sourceDiv.innerHTML = `<div class="print-page-inner"><h1 class="text-2xl font-bold text-center mb-6">${articleTitle}</h1><div class="p-inner-content text-sm leading-relaxed whitespace-pre-wrap">${sourceText}</div></div>`;
        container.appendChild(sourceDiv);
      }

      // 따라쓰기 페이지
      if (document.getElementById('pattern-guide').checked) {
        const pageDiv = document.createElement('div');
        pageDiv.className = `a4-page ${orientation === 'portrait' ? 'portrait-page' : 'landscape-page'} print-page`;
        const cols = parseInt(gridCols) || 20;
        const rows = Math.ceil(sourceText.length / cols);
        let gridHTML = `<div class="print-page-inner"><div class="grid gap-0" style="grid-template-columns: repeat(${cols}, 1fr);">`;
        for (let i = 0; i < cols * rows; i++) {
          const char = sourceText[i] || '';
          gridHTML += `<div class="grid-cell-guide border border-slate-300 aspect-square flex items-center justify-center p-1" style="transform: translateY(var(--char-y-offset));"><span class="text-sm">${char}</span></div>`;
        }
        gridHTML += '</div></div>';
        pageDiv.innerHTML = gridHTML;
        container.appendChild(pageDiv);
      }

      // 빈 원고지
      if (document.getElementById('pattern-empty').checked) {
        const pageDiv = document.createElement('div');
        pageDiv.className = `a4-page ${orientation === 'portrait' ? 'portrait-page' : 'landscape-page'} print-page`;
        const cols = parseInt(gridCols) || 20;
        const rows = Math.ceil(sourceText.length / cols);
        let gridHTML = `<div class="print-page-inner"><div class="grid gap-0" style="grid-template-columns: repeat(${cols}, 1fr);">`;
        for (let i = 0; i < cols * rows; i++) {
          gridHTML += `<div class="grid-cell-guide border border-slate-300 aspect-square flex items-center justify-center p-1"></div>`;
        }
        gridHTML += '</div></div>';
        pageDiv.innerHTML = gridHTML;
        container.appendChild(pageDiv);
      }
    }

    renderPages();
    updatePageStyleSheet();
  </script>
</body>
</html>
